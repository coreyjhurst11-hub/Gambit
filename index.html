/* result code helpers */
function resultPoints(code, side, cfg){
  const W=cfg.pointsWin, D=cfg.pointsDraw, L=cfg.pointsLoss;
  switch(code){
    case '1-0': return side==='w'?W:L;
    case '0-1': return side==='w'?L:W;
    case '=':   return D;
    case '1F':  return side==='w'?W:L;   // black forfeited
    case '0F':  return side==='w'?L:W;   // white forfeited
    case 'XX':  return L;                // double forfeit
    default: return 0;
  }
}
function resultOutcome(code, side){ // returns 'W'|'L'|'D'|null and played bool
  switch(code){
    case '1-0': return {o:side==='w'?'W':'L', played:true};
    case '0-1': return {o:side==='w'?'L':'W', played:true};
    case '=':   return {o:'D', played:true};
    case '1F':  return {o:side==='w'?'W':'L', played:false};
    case '0F':  return {o:side==='w'?'L':'W', played:false};
    case 'XX':  return {o:'L', played:false};
    default: return null;
  }
}

/* Core stats per player across all rounds */
function computeStats(t){
  const cfg=t.config;
  const stats={};
  t.players.forEach(p=>{
    stats[p.id]={ id:p.id, name:p.name, club:p.club||'', seed:p.seed, active:p.active!==false,
      status:p.status||'active', score:0, played:0, wins:0, winsPlay:0, winsBlack:0, draws:0,
      losses:0, byes:0, cW:0, cB:0, colorHist:[], opps:[], roundScores:[], cumulative:0,
      lastColor:null, hadFullBye:false, lateStart: p.startScore||0 };
  });
  // apply late-entry starting score
  t.players.forEach(p=>{ if(p.startScore){ stats[p.id].score += p.startScore; } });

  (t.rounds||[]).forEach(rd=>{
    (rd.pairings||[]).forEach(pr=>{
      if(pr.bye){
        const s=stats[pr.player]; if(!s) return;
        const v = pr.byeType==='half'?cfg.pointsDraw : pr.byeType==='zero'?0 : cfg.byeValue;
        s.score+=v; s.byes++; if(pr.byeType!=='zero'&&pr.byeType!=='half') s.hadFullBye=true;
        if(pr.byeType!=='half') s.hadFullBye=true;
        if(v>=cfg.pointsWin) s.wins++;
        s.colorHist.push('-');
        s.opps.push({id:null, bye:true, o: v>=cfg.pointsWin?'W':(v>=cfg.pointsDraw?'D':'L'), played:false, color:null});
        return;
      }
      const W=stats[pr.white], B=stats[pr.black]; if(!W||!B) return;
      const wp=resultPoints(pr.result,'w',cfg), bp=resultPoints(pr.result,'b',cfg);
      const wo=resultOutcome(pr.result,'w'), bo=resultOutcome(pr.result,'b');
      W.score+=wp; B.score+=bp;
      // colors only count if game was actually played
      const played = wo && wo.played;
      if(played){ W.cW++; B.cB++; W.lastColor='W'; B.lastColor='B'; }
      W.colorHist.push(played?'W':'-'); B.colorHist.push(played?'B':'-');
      if(wo){ W.opps.push({id:pr.black,o:wo.o,played:wo.played,color:'W'});
              if(wo.o==='W'){W.wins++; if(wo.played)W.winsPlay++;}
              else if(wo.o==='D')W.draws++; else W.losses++;
              if(wo.played)W.played++; }
      if(bo){ B.opps.push({id:pr.white,o:bo.o,played:bo.played,color:'B'});
              if(bo.o==='W'){B.wins++; if(bo.played){B.winsPlay++; B.winsBlack++;}}
              else if(bo.o==='D')B.draws++; else B.losses++;
              if(bo.played)B.played++; }
    });
    // running cumulative after this round
    t.players.forEach(p=>{ const s=stats[p.id]; s.cumulative+=s.score; s.roundScores.push(s.score); });
  });
  return stats;
}

/* Tiebreak computations (depend on final scores) */
function computeTiebreaks(t, stats){
  const cfg=t.config; const ids=Object.keys(stats);
  const oppScore = id => id&&stats[id]?stats[id].score:0;
  const oppCum = id => id&&stats[id]?stats[id].cumulative:0;
  const maxPossible = (t.rounds||[]).length * cfg.pointsWin || 1;
  ids.forEach(id=>{
    const s=stats[id];
    // build list of opponent scores; byes use self-score as virtual opponent
    const oppScores=[]; let sb=0, koya=0, oppCumSum=0, deList=[];
    s.opps.forEach(o=>{
      let osc;
      if(o.bye){ osc=s.score; } else { osc=oppScore(o.id); oppCumSum+=oppCum(o.id); }
      oppScores.push(osc);
      const f = o.o==='W'?1:o.o==='D'?0.5:0;
      sb += f*osc;
      // koya: opponents who scored >=50%
      if(osc >= maxPossible*0.5){ koya += (o.o==='W'?cfg.pointsWin:o.o==='D'?cfg.pointsDraw:0); }
    });
    const sorted=[...oppScores].sort((a,b)=>a-b);
    const sum=oppScores.reduce((a,b)=>a+b,0);
    s.tb={};
    s.tb.buchholz=sum;
    s.tb.buchholzCut1= sorted.length?sum-sorted[0]:0;
    s.tb.median= sorted.length>=2 ? sum-sorted[0]-sorted[sorted.length-1] : (sorted.length?0:0);
    s.tb.sonneborn=sb;
    s.tb.cumulative=s.cumulative;
    s.tb.cumulativeOpp=oppCumSum;
    s.tb.wins=s.wins;
    s.tb.winsPlay=s.winsPlay;
    s.tb.winsBlack=s.winsBlack;
    s.tb.gamesBlack=s.cB;
    s.tb.koya=koya;
    s.tb.avgOpp= oppScores.length? sum/oppScores.length : 0;
    s.tb.seed= -(s.seed||0); // lower seed = better, so negate for "higher is better"
    s.tb.direct=0; // contextual
  });
}

/* Direct encounter score among a set of tied players */
function directScore(id, tiedSet, stats){
  const s=stats[id]; let pts=0, games=0;
  s.opps.forEach(o=>{ if(o.id && tiedSet.has(o.id) && o.played!==undefined){
    games++; pts += o.o==='W'?1:o.o==='D'?0.5:0;
  }});
  return games? pts/games : -1; // normalize; -1 if no encounters
}

/* Build final, sorted standings array */
function getStandings(t){
  const stats=computeStats(t);
  computeTiebreaks(t,stats);
  const tbOn = t.config.useTiebreaks!==false;
  const order = tbOn ? ((t.config.tiebreaks&&t.config.tiebreaks.length)?t.config.tiebreaks:DEFAULT_TB[t.format]||['buchholz']) : [];
  let arr=Object.values(stats);
  // primary numeric sort: score then each configured tiebreak (skip 'direct' here)
  const cmp=(a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    for(const k of order){
      if(k==='direct') continue;
      const av=a.tb[k]??0, bv=b.tb[k]??0;
      if(bv!==av) return bv-av;
    }
    // final fallback: seed (display stability only — not a ranking tiebreak)
    return (a.seed||0)-(b.seed||0);
  };
  arr.sort(cmp);
  // apply direct encounter inside equal runs if configured
  if(order.includes('direct')){
    let i=0;
    while(i<arr.length){
      let j=i+1;
      const equal=(x,y)=>{ if(x.score!==y.score) return false;
        for(const k of order){ if(k==='direct') continue; if((x.tb[k]??0)!==(y.tb[k]??0)) return false; } return true; };
      while(j<arr.length && equal(arr[i],arr[j])) j++;
      if(j-i>1){
        const run=arr.slice(i,j); const set=new Set(run.map(r=>r.id));
        run.sort((a,b)=>{ const d=directScore(b.id,set,stats)-directScore(a.id,set,stats);
          if(d!==0) return d; return (a.seed||0)-(b.seed||0); });
        for(let k=0;k<run.length;k++) arr[i+k]=run[k];
      }
      i=j;
    }
  }
  // rank assignment
  if(tbOn){
    arr.forEach((s,idx)=>{ s.rank=idx+1; });
  } else {
    // tiebreaks off: players level on points share a rank (1,2,2,4 …)
    arr.forEach((s,idx)=>{ s.rank = (idx>0 && arr[idx-1].score===s.score) ? arr[idx-1].rank : idx+1; });
  }
  return {arr, stats, order, tbOn};
}

/* color preference: +n means wants White, -n wants Black; magnitude = strength */
function colorPref(s){
  const diff = s.cW - s.cB;           // >0 had more whites -> wants black
  // strong/absolute if |diff|>=2 or last two same color
  const h = s.colorHist.filter(c=>c!=='-');
  const lastTwoSame = h.length>=2 && h[h.length-1]===h[h.length-2];
  let pref = -diff; // wants opposite of surplus
  let strength = Math.abs(diff);
  if(s.lastColor){ // mild preference to alternate
    const alt = s.lastColor==='W'? -1 : 1;
    if(strength===0){ pref=alt; strength=0.5; }
  }
  let absolute = Math.abs(diff)>=2 || lastTwoSame;
  return {pref, strength: absolute?99:strength, absolute, last:s.lastColor};
}

/* =================== USCF-STYLE RATING ESTIMATES =================== */
/* All ratings produced here are ESTIMATES using public USCF formulas. */
const UNRATED_DEFAULT = 1000;     // assumed strength of an unrated opponent (estimate only)
const DEFAULT_PRIOR_GAMES = 30;   // effective prior games when not specified (drives the K-factor)

function uscfExpected(r, opp){ return 1/(1 + Math.pow(10, (opp - r)/400)); }

/* performance rating: rating P at which expected score == actual score (binary search), capped */
function uscfPerformance(oppRatings, score){
  const n=oppRatings.length; if(!n) return null;
  const avg=oppRatings.reduce((a,b)=>a+b,0)/n;
  if(score<=0)  return Math.round(avg-400);
  if(score>=n)  return Math.round(avg+400);
  let lo=1, hi=3500;
  for(let it=0; it<60; it++){
    const mid=(lo+hi)/2;
    const exp=oppRatings.reduce((a,o)=>a+uscfExpected(mid,o),0);
    if(exp<score) lo=mid; else hi=mid;
  }
  return Math.round((lo+hi)/2);
}

/* Per-player estimated rating + tournament performance, from played (non-forfeit) games */
function computeRatings(t){
  const pmap={}; t.players.forEach(p=>pmap[p.id]=p);
  const ratingOf=id=>{ const p=pmap[id]; return (p&&p.rating>0)?p.rating:null; };
  const games={};
  (t.rounds||[]).forEach(rd=>{
    rd.pairings.forEach(pr=>{
      if(pr.bye||!pr.result) return;
      ['w','b'].forEach(side=>{
        const id=side==='w'?pr.white:pr.black;
        const oppId=side==='w'?pr.black:pr.white;
        if(!id||!oppId) return;
        const oc=resultOutcome(pr.result, side);
        if(!oc||!oc.played) return; // skip byes/forfeits — not rated games
        const sc = oc.o==='W'?1 : oc.o==='D'?0.5 : 0;
        const oppR=ratingOf(oppId);
        (games[id]=games[id]||[]).push({oppR: oppR!=null?oppR:UNRATED_DEFAULT, score:sc});
      });
    });
  });
  const out={};
  t.players.forEach(p=>{
    const gl=games[p.id]||[];
    const played=gl.length;
    const r0 = p.rating>0 ? p.rating : null;
    const scoreSum = gl.reduce((a,g)=>a+g.score,0);
    const oppRs = gl.map(g=>g.oppR);
    const avgOpp = played?Math.round(oppRs.reduce((a,b)=>a+b,0)/played):null;
    const perf = played?uscfPerformance(oppRs, scoreSum):null;
    let estDelta=null, estNew=null;
    if(played){
      if(r0!=null){
        const Ne=(p.priorGames>0?p.priorGames:DEFAULT_PRIOR_GAMES);
        const K=800/(Ne+played);
        const expSum=gl.reduce((a,g)=>a+uscfExpected(r0,g.oppR),0);
        estDelta=Math.round(K*(scoreSum-expSum));
        estNew=r0+estDelta;
      } else {
        estNew=perf; // unrated player: bootstrap estimate from performance
      }
    }
    out[p.id]={ rating:r0, rated:r0!=null, played, scoreSum, avgOpp, perf, estDelta, estNew };
  });
  return out;
}
function fmtRating(v){ return (v==null)?'—':String(Math.round(v)); }
function fmtDelta(v){ return (v==null)?'' : (v>0?'+'+v : v<0?('−'+Math.abs(v)) : '±0'); }

/* ===== part4_pairing ===== */
/* ===================================================================
   PAIRING ENGINES
   =================================================================== */

/* previous opponents set for a player */
function prevOpponents(t, upToRound){
  const map={}; t.players.forEach(p=>map[p.id]=new Set());
  (t.rounds||[]).forEach(rd=>{
    if(upToRound!=null && rd.number>=upToRound) return;
    (rd.pairings||[]).forEach(pr=>{
      if(pr.bye) return;
      if(map[pr.white]) map[pr.white].add(pr.black);
      if(map[pr.black]) map[pr.black].add(pr.white);
    });
  });
  return map;
}
function hadBye(t, id, upToRound){
  return (t.rounds||[]).some(rd=> (upToRound==null||rd.number<upToRound) &&
    (rd.pairings||[]).some(pr=>pr.bye && pr.player===id && pr.byeType!=='half'));
}

/* eligible players for a given Swiss round */
function eligiblePlayers(t, roundNum){
  return t.players.filter(p=>{
    if(p.status==='withdrawn') return false;
    if(p.active===false) return false;
    if((p.addedRound||1) > roundNum) return false;          // not yet entered
    if((p.requestedByes||[]).includes(roundNum)) return false; // wants a bye
    return true;
  });
}

/* color assignment for a pair given prior history */
function assignColors(a,b,roundNum,boardIdx){
  if(roundNum===1){
    return boardIdx%2===0 ? {white:a,black:b} : {white:b,black:a};
  }
  // cost of giving player s the color c ('W'|'B'): lower is better
  const colorCost=(s,c)=>{
    const newDiff = c==='W' ? (s.cW+1)-s.cB : s.cW-(s.cB+1);
    let cost=0;
    const ad=Math.abs(newDiff);
    if(ad>2) cost+=100;            // never exceed ±2 if avoidable
    else if(ad===2) cost+=6;
    // three-in-a-row of actually-played colors
    const h=s.colorHist.filter(x=>x!=='-');
    if(h.length>=2 && h[h.length-1]===c && h[h.length-2]===c) cost+=40;
    // mild preference to alternate from last color
    if(s.lastColor && s.lastColor===c) cost+=1;
    // reward moving toward balance
    cost += Math.max(0, ad - Math.abs(s.cW-s.cB))*0.5;
    return cost;
  };
  const opt1 = colorCost(a,'W')+colorCost(b,'B'); // a white
  const opt2 = colorCost(b,'W')+colorCost(a,'B'); // b white
  if(opt1<opt2) return {white:a,black:b};
  if(opt2<opt1) return {white:b,black:a};
  // tie: higher score (then better seed) takes White
  return (a.score>b.score || (a.score===b.score && a.seed<=b.seed)) ? {white:a,black:b} : {white:b,black:a};
}

/* backtracking matcher: returns array of [a,b] pairs, no rematches if possible */
function matchPlayers(pool, prev, allowRematch){
  let steps=0; const CAP=200000;
  function rec(list){
    if(list.length===0) return [];
    if(steps++>CAP) return null;
    const a=list[0], rest=list.slice(1);
    // candidate ordering: prefer not-previously-played, then nearest score, then color fit
    let cands=rest.map((b,i)=>({b,i}));
    if(!allowRematch) cands=cands.filter(c=>!prev[a.id].has(c.b.id));
    cands.sort((x,y)=>{
      const dpx=Math.abs(a.score-x.b.score), dpy=Math.abs(a.score-y.b.score);
      if(dpx!==dpy) return dpx-dpy;
      // color compatibility
      const cx=colorCompat(a,x.b), cy=colorCompat(a,y.b);
      if(cx!==cy) return cy-cx;
      return x.b.seed-y.b.seed;
    });
    for(const c of cands){
      const remaining=rest.filter((_,i)=>i!==c.i);
      const sub=rec(remaining);
      if(sub!==null) return [[a,c.b],...sub];
    }
    return null;
  }
  return rec(pool);
}
function colorCompat(a,b){
  const pa=colorPref(a), pb=colorPref(b);
  if(Math.sign(pa.pref)!==Math.sign(pb.pref)) return 2; // opposite prefs -> ideal
  if(pa.pref===0||pb.pref===0) return 1;
  return 0; // clash
}

/* ---------- SWISS ---------- */
function pairSwissRound(t, roundNum){
  const stats=computeStats(t); computeTiebreaks(t,stats);
  const elig=eligiblePlayers(t,roundNum).map(p=>{
    const s=stats[p.id];
    return {...s, seed:p.seed};
  });
  // sort by score desc, then existing buchholz-ish? use cumulative then seed
  elig.sort((a,b)=> b.score-a.score || (b.tb.buchholz-a.tb.buchholz) || (a.seed-b.seed));
  const prev=prevOpponents(t,roundNum);
  const pairings=[]; const warnings=[];
  let pool=[...elig];
  let byePr=null;

  // requested byes already excluded by eligiblePlayers; add their bye pairings
  t.players.forEach(p=>{
    if((p.requestedByes||[]).includes(roundNum) && p.status!=='withdrawn' && (p.addedRound||1)<=roundNum)
      pairings.push({bye:true, player:p.id, byeType:'half', result:'bye'});
  });

  // odd -> assign full bye to lowest-scoring eligible player without a prior full bye
  if(pool.length%2!==0){
    let candidate=null;
    for(let i=pool.length-1;i>=0;i--){ if(!hadBye(t,pool[i].id,roundNum)){candidate=pool[i];break;} }
    if(!candidate) candidate=pool[pool.length-1];
    byePr={bye:true, player:candidate.id, byeType:'full', result:'bye'};
    pool=pool.filter(p=>p.id!==candidate.id);
  }

  // match
  let res=matchPlayers(pool,prev,false);
  if(res===null){ res=matchPlayers(pool,prev,true); warnings.push('Some rematches were unavoidable — review boards flagged in red.'); }
  if(res===null){ // last resort sequential
    res=[]; for(let i=0;i<pool.length;i+=2) res.push([pool[i],pool[i+1]]);
  }
  res.forEach(([a,b],idx)=>{
    const {white,black}=assignColors(a,b,roundNum,idx);
    const rematch=prev[white.id]&&prev[white.id].has(black.id);
    pairings.push({white:white.id, black:black.id, result:null, _rematch:rematch});
  });
  if(byePr) pairings.push(byePr);
  numberBoards(t,pairings,stats);
  return {pairings,warnings};
}

/* assign board numbers: highest combined score first, byes last */
function numberBoards(t,pairings,stats){
  stats=stats||computeStats(t);
  const games=pairings.filter(p=>!p.bye);
  games.sort((p1,p2)=>{
    const s1=(stats[p1.white]?.score||0)+(stats[p1.black]?.score||0);
    const s2=(stats[p2.white]?.score||0)+(stats[p2.black]?.score||0);
    return s2-s1;
  });
  games.forEach((p,i)=>p.board=i+1);
  pairings.filter(p=>p.bye).forEach(p=>p.board=null);
}

/* ---------- ROUND ROBIN (Berger) ---------- */
function bergerSchedule(ids){
  let ps=[...ids]; const odd=ps.length%2!==0; if(odd) ps.push('__BYE__');
  const n=ps.length, fixed=ps[0]; let rot=ps.slice(1); const rounds=[];
  for(let r=0;r<n-1;r++){
    const arr=[fixed,...rot]; const games=[];
    for(let i=0;i<n/2;i++){
      let a=arr[i], b=arr[n-1-i];
      if((r+i)%2===1)[a,b]=[b,a];
      games.push([a,b]);
    }
    rounds.push(games); rot.unshift(rot.pop());
  }
  return rounds;
}
function buildRRrounds(ids, doubleRR){
  let sched=bergerSchedule(ids);
  let rounds=sched.map((games,ri)=>roundFromGames(games,ri+1));
  if(doubleRR){
    const second=sched.map((games,ri)=>roundFromGames(games.map(([a,b])=>[b,a]), rounds.length+ri+1));
    rounds=rounds.concat(second);
  }
  return rounds;
}
function roundFromGames(games, number){
  const pairings=[]; let board=1;
  games.forEach(([a,b])=>{
    if(a==='__BYE__'){ pairings.push({bye:true,player:b,byeType:'full',result:'bye',board:null}); return; }
    if(b==='__BYE__'){ pairings.push({bye:true,player:a,byeType:'full',result:'bye',board:null}); return; }
    pairings.push({white:a,black:b,result:null,board:board++});
  });
  return {number,pairings};
}

/* ---------- QUADS ---------- */
function buildQuads(players){
  const sorted=[...players].sort((a,b)=>a.seed-b.seed).map(p=>p.id);
  const groups=[]; for(let i=0;i<sorted.length;i+=4) groups.push(sorted.slice(i,i+4));
  // generate berger per group, merge by round index
  const groupScheds=groups.map(g=> g.length>=2? bergerSchedule(g) : [[[g[0],'__BYE__']]] );
  const maxR=Math.max(...groupScheds.map(s=>s.length),0);
  const rounds=[];
  for(let r=0;r<maxR;r++){
    let board=1; const pairings=[];
    groupScheds.forEach(gs=>{
      const games=gs[r]||[];
      games.forEach(([a,b])=>{
        if(a==='__BYE__'){pairings.push({bye:true,player:b,byeType:'full',result:'bye',board:null});return;}
        if(b==='__BYE__'){pairings.push({bye:true,player:a,byeType:'full',result:'bye',board:null});return;}
        pairings.push({white:a,black:b,result:null,board:board++});
      });
    });
    rounds.push({number:r+1,pairings});
  }
  return rounds;
}

/* ---------- SCHEVENINGEN (two teams) ---------- */
function buildScheveningen(teamA, teamB){
  // every A plays every B; schedule via rotation
  const a=[...teamA], b=[...teamB]; const n=Math.max(a.length,b.length);
  while(a.length<n)a.push('__BYE__'); while(b.length<n)b.push('__BYE__');
  const rounds=[];
  for(let r=0;r<n;r++){
    let board=1; const pairings=[];
    for(let i=0;i<n;i++){
      const pa=a[i], pb=b[(i+r)%n];
      if(pa==='__BYE__'||pb==='__BYE__') continue;
      // alternate colors so each team gets balanced white/black
      let white=pa, black=pb; if((r+i)%2===1)[white,black]=[black,white];
      pairings.push({white,black,result:null,board:board++});
    }
    rounds.push({number:r+1,pairings});
  }
  return rounds;
}

/* ---------- ELIMINATION (single & double) ---------- */
function seedOrder(n){ // standard bracket seed positions for size n (power of 2)
  let seeds=[1,2];
  while(seeds.length<n){
    const m=seeds.length*2; const next=[];
    seeds.forEach(s=>{ next.push(s); next.push(m+1-s); });
    seeds=next;
  }
  return seeds;
}
function nextPow2(n){ let p=1; while(p<n)p*=2; return p; }

function buildKnockoutR1(players){
  const sorted=[...players].sort((a,b)=>a.seed-b.seed);
  const size=nextPow2(sorted.length);
  const order=seedOrder(size); // array of seed numbers in bracket slot order
  const slots=order.map(s=> sorted[s-1]? sorted[s-1].id : null); // null = empty (bye)
  const pairings=[]; let board=1;
  for(let i=0;i<slots.length;i+=2){
    const a=slots[i], b=slots[i+1];
    if(a&&b){ pairings.push({white:a,black:b,result:null,board:board++,bracket:'W'}); }
    else if(a||b){ pairings.push({bye:true,player:a||b,byeType:'full',result:'bye',board:null,bracket:'W'}); }
  }
  return [{number:1,pairings}];
}
/* advance single elimination: build next round from winners of current */
function advanceKnockout(t){
  const last=t.rounds[t.rounds.length-1];
  const winners=[];
  last.pairings.forEach(pr=>{
    if(pr.bye){ winners.push(pr.player); }
    else { const w=winnerOf(pr); if(w) winners.push(w); }
  });
  if(winners.length<2) return null;
  const pairings=[]; let board=1;
  for(let i=0;i<winners.length;i+=2){
    if(winners[i]&&winners[i+1]) pairings.push({white:winners[i],black:winners[i+1],result:null,board:board++,bracket:'W'});
    else if(winners[i]) pairings.push({bye:true,player:winners[i],byeType:'full',result:'bye',board:null,bracket:'W'});
  }
  return {number:t.rounds.length+1,pairings};
}
function winnerOf(pr){
  if(pr.bye) return pr.player;
  switch(pr.result){
    case '1-0': case '1F': return pr.white;
    case '0-1': case '0F': return pr.black;
    default: return null; // draw or none — elimination needs decisive; handle via playoff note
  }
}
function loserOf(pr){
  if(pr.bye) return null;
  switch(pr.result){
    case '1-0': case '1F': return pr.black;
    case '0-1': case '0F': return pr.white;
    default: return null;
  }
}

/* ---------- DOUBLE ELIMINATION (graph-based, power-of-2 with byes) ---------- */
function buildDoubleElim(players){
  const sorted=[...players].sort((a,b)=>a.seed-b.seed);
  const N=nextPow2(Math.max(2,sorted.length)); const k=Math.log2(N);
  const order=seedOrder(N);
  const slotPlayer=order.map(s=> sorted[s-1]?sorted[s-1].id:null);
  let matches=[]; let mid=0; const M=()=>('m'+(mid++));
  // Winners bracket
  const wb=[]; // wb[r] = array of match ids
  // WB round 1
  let r1=[];
  for(let i=0;i<slotPlayer.length;i+=2){
    const id=M(); matches.push({id,bracket:'W',round:1,a:{seed:slotPlayer[i]},b:{seed:slotPlayer[i+1]}});
    r1.push(id);
  } wb.push(r1);
  for(let r=2;r<=k;r++){
    const prev=wb[r-2]; const cur=[];
    for(let i=0;i<prev.length;i+=2){ const id=M();
      matches.push({id,bracket:'W',round:r,a:{winner:prev[i]},b:{winner:prev[i+1]}}); cur.push(id);}
    wb.push(cur);
  }
  // Losers bracket
  const lb=[]; let lbRoundNum=1;
  // LB round 1: losers of WB1 paired
  let prevLB=[];
  { const losers=wb[0].map(m=>({loser:m})); const cur=[];
    for(let i=0;i<losers.length;i+=2){ const id=M();
      matches.push({id,bracket:'L',round:lbRoundNum,a:losers[i],b:losers[i+1]||{bye:true}}); cur.push(id);}
    lb.push(cur); prevLB=cur; lbRoundNum++;
  }
  // subsequent: alternate major (vs WB losers) and minor (LB internal)
  for(let wr=2; wr<=k; wr++){
    // major round: winner of prevLB vs loser of WB round wr (reversed to spread)
    const wbLosers=wb[wr-1].map(m=>({loser:m})).reverse();
    let cur=[];
    for(let i=0;i<prevLB.length;i++){ const id=M();
      matches.push({id,bracket:'L',round:lbRoundNum,a:{winner:prevLB[i]},b:wbLosers[i]||{bye:true}}); cur.push(id);}
    lb.push(cur); prevLB=cur; lbRoundNum++;
    // minor round: pair winners of major (skip if only one match -> that's LB final)
    if(prevLB.length>1){
      const nxt=[]; for(let i=0;i<prevLB.length;i+=2){ const id=M();
        matches.push({id,bracket:'L',round:lbRoundNum,a:{winner:prevLB[i]},b:{winner:prevLB[i+1]}}); nxt.push(id);}
      lb.push(nxt); prevLB=nxt; lbRoundNum++;
    }
  }
  const lbFinal=prevLB[0];
  const wbFinal=wb[k-1][0];
  // Grand final
  const gf=M(); matches.push({id:gf,bracket:'GF',round:1,a:{winner:wbFinal},b:{winner:lbFinal}});
  return {matches, gf, double:true};
}

/* resolve a slot reference to a player id (or null if undecided) */
function resolveSlot(slot, byId){
  if(!slot) return undefined;
  if(slot.bye) return null;
  if('seed' in slot) return slot.seed; // already a player id placed at build (we stored ids)
  if(slot.winner){ const m=byId[slot.winner]; return m? winnerOfMatch(m):undefined; }
  if(slot.loser){ const m=byId[slot.loser]; return m? loserOfMatch(m):undefined; }
  return undefined;
}
function winnerOfMatch(m){
  if(m._a==null||m._b==null){ // bye
    if(m._a&&!m._b) return m._a; if(m._b&&!m._a) return m._b;
  }
  return winnerOf({white:m._a,black:m._b,result:m.result,bye:false});
}
function loserOfMatch(m){ return loserOf({white:m._a,black:m._b,result:m.result}); }

/* ===== part5_controller ===== */
/* ===================================================================
   CONTROLLER — tournaments, schedule, results, players, byes, I/O
   =================================================================== */

function defaultConfig(format, nPlayers){
  return {
    rounds: format==='swiss' ? Math.max(3, Math.min(9, Math.ceil(Math.log2(Math.max(2,nPlayers)))+1)) : null,
    byeValue: 1, requestedByeAllowed:true,
    pointsWin:1, pointsDraw:0.5, pointsLoss:0,
    colorRules:true, seeding:'order',
    rated:false,
    useTiebreaks:true,
    tiebreaks: (DEFAULT_TB[format]||['buchholz']).slice(),
    teamA:[], teamB:[], teamAName:'Team A', teamBName:'Team B',
  };
}

function createTournament(data){
  const id=uid();
  const t={ id, name:data.name||'Untitled Tournament', format:data.format||'swiss',
    createdAt:Date.now(), status:'setup', players:[], rounds:[], config:defaultConfig(data.format,0),
    bracket:null, scheduleGenerated:false };
  Object.assign(t.config, data.config||{});
  DB.tournaments[id]=t; DB.activeId=id; saveDB(true);
  return t;
}

function addPlayer(t, name, club, rating, priorGames){
  if(!name||!name.trim()) return null;
  const seed=(t.players.length+1);
  const startRound=(t.rounds||[]).length>0 ? currentRoundNumber(t)+1 : 1;
  const p={ id:uid(), name:name.trim(), club:(club||'').trim(), seed, status:'active', active:true,
    requestedByes:[], addedRound:1, startScore:0 };
  const r=parseInt(rating,10); if(!isNaN(r)&&r>0) p.rating=r;
  const g=parseInt(priorGames,10); if(!isNaN(g)&&g>0) p.priorGames=g;
  // late entry: if tournament already has rounds, mark addedRound and offer scoring later
  if((t.rounds||[]).length>0){ p.addedRound = startRound; }
  t.players.push(p);
  return p;
}

function currentRoundNumber(t){ return (t.rounds||[]).length ? t.rounds[t.rounds.length-1].number : 0; }
function roundComplete(t, rd){ return rd.pairings.every(pr=>pr.bye || pr.result); }
function totalRounds(t){
  if(t.config.rounds) return t.config.rounds;
  return (t.rounds||[]).length || estimateRounds(t);
}
function estimateRounds(t){
  const n=t.players.filter(p=>p.status!=='withdrawn').length;
  switch(t.format){
    case 'rr': return n%2? n : n-1;
    case 'drr': return (n%2? n : n-1)*2;
    case 'quad': return 3;
    case 'knockout': return Math.ceil(Math.log2(Math.max(2,n)));
    case 'doubleko': return Math.max(1,(t.rounds||[]).length);
    case 'scheveningen': return Math.max(t.config.teamA.length,t.config.teamB.length);
    default: return t.config.rounds||5;
  }
}

/* Generate full schedule for non-Swiss / non-knockout formats */
function generateSchedule(t){
  const active=t.players.filter(p=>p.status!=='withdrawn');
  if(active.length<2){ toast('Add at least two players first','warn'); return false; }
  switch(t.format){
    case 'rr':  t.rounds=buildRRrounds(active.map(p=>p.id),false); break;
    case 'drr': t.rounds=buildRRrounds(active.map(p=>p.id),true); break;
    case 'quad':{
      const sorted=active.slice().sort((a,b)=>a.seed-b.seed);
      const groups=[]; for(let i=0;i<sorted.length;i+=4) groups.push(sorted.slice(i,i+4).map(p=>p.id));
      t.config.quadGroups=groups; t.rounds=buildQuads(active); break;
    }
    case 'scheveningen':{
      const A=t.config.teamA.filter(id=>active.find(p=>p.id===id));
      const B=t.config.teamB.filter(id=>active.find(p=>p.id===id));
      if(A.length<1||B.length<1){ toast('Assign players to both teams in Settings','warn'); return false; }
      t.rounds=buildScheveningen(A,B); break;
    }
    case 'knockout': t.rounds=buildKnockoutR1(active); break;
    case 'doubleko': {
      t.bracket=buildDoubleElim(active);
      // place seed ids onto seed slots
      t.bracket.matches.forEach(m=>{
        if(m.a&&'seed'in m.a) m.a={pid:m.a.seed};
        if(m.b&&'seed'in m.b) m.b={pid:m.b.seed};
      });
      projectBracketToRounds(t);
      break;
    }
    default: return false;
  }
  t.scheduleGenerated=true; t.status='running';
  return true;
}

/* Double-elim: resolve slots & project graph into display rounds */
function projectBracketToRounds(t){
  const bk=t.bracket; const byId={}; bk.matches.forEach(m=>byId[m.id]=m);
  // iterative slot resolution
  let changed=true, guard=0;
  bk.matches.forEach(m=>{ m._a=m._a??null; m._b=m._b??null; });
  while(changed && guard++<50){
    changed=false;
    bk.matches.forEach(m=>{
      const ra=resolveRef(m.a,byId), rb=resolveRef(m.b,byId);
      if(ra!==undefined && m._a!==ra){ m._a=ra; changed=true; }
      if(rb!==undefined && m._b!==rb){ m._b=rb; changed=true; }
    });
  }
  // group into waves: a match is "ready" when both slots resolved (or one bye)
  // assign round numbers by dependency depth
  const depth={};
  function dep(m){ if(depth[m.id]!=null) return depth[m.id];
    let d=0; [m.a,m.b].forEach(s=>{ if(s&&(s.winner||s.loser)){ const src=byId[s.winner||s.loser]; if(src) d=Math.max(d,dep(src)+1);} });
    depth[m.id]=d; return d; }
  bk.matches.forEach(dep);
  const maxD=Math.max(...bk.matches.map(m=>depth[m.id]));
  const rounds=[];
  for(let d=0; d<=maxD; d++){
    const ms=bk.matches.filter(m=>depth[m.id]===d);
    if(!ms.length) continue;
    const pairings=[]; let board=1;
    ms.forEach(m=>{
      if(m._a&&m._b){ pairings.push({white:m._a,black:m._b,result:m.result||null,board:board++,bracket:m.bracket,matchId:m.id}); }
      else if(m._a&&!m._b){ pairings.push({bye:true,player:m._a,byeType:'full',result:'bye',board:null,bracket:m.bracket,matchId:m.id}); }
      else if(m._b&&!m._a){ pairings.push({bye:true,player:m._b,byeType:'full',result:'bye',board:null,bracket:m.bracket,matchId:m.id}); }
      else { pairings.push({white:null,black:null,result:null,board:board++,bracket:m.bracket,matchId:m.id,pending:true}); }
    });
    rounds.push({number:rounds.length+1,pairings,wave:d});
  }
  t.rounds=rounds;
}
function resolveRef(slot,byId){
  if(!slot) return null;
  if(slot.bye) return null;
  if('pid'in slot) return slot.pid;
  if(slot.winner){ const m=byId[slot.winner]; if(!m) return undefined;
    if(m._a&&!m._b) return m._a; if(m._b&&!m._a) return m._b;
    return winnerOf({white:m._a,black:m._b,result:m.result,bye:false}); }
  if(slot.loser){ const m=byId[slot.loser]; if(!m) return undefined;
    if(m._a&&!m._b) return undefined; // bye has no loser
    return loserOf({white:m._a,black:m._b,result:m.result}); }
  return undefined;
}

/* Generate next round (Swiss / knockout) */
function generateNextRound(t){
  if(t.format==='swiss'){
    const next=currentRoundNumber(t)+1;
    if(t.config.rounds && next>t.config.rounds){ toast('All scheduled rounds are complete','warn'); return false; }
    const last=t.rounds[t.rounds.length-1];
    if(last && !roundComplete(t,last)){ toast('Enter all results for the current round first','warn'); return false; }
    const {pairings,warnings}=pairSwissRound(t,next);
    const rd={number:next,pairings};
    t.rounds.push(rd);
    t.status='running';
    return {number:next,pairings,warnings};
  } else if(t.format==='knockout'){
    const last=t.rounds[t.rounds.length-1];
    if(!roundComplete(t,last)){ toast('Enter all results first','warn'); return false; }
    const decisive=last.pairings.every(pr=>pr.bye||winnerOf(pr));
    if(!decisive){ toast('Knockout needs a decisive result on every board (no draws)','err',4200); return false; }
    const nr=advanceKnockout(t);
    if(!nr){ toast('Tournament complete — you have a champion!','ok'); t.status='complete'; return false; }
    t.rounds.push(nr); return nr;
  }
  toast('This format’s full schedule is already generated','warn'); return false;
}

/* set a result */
function setResult(t, roundNum, board, code){
  const rd=t.rounds.find(r=>r.number===roundNum); if(!rd) return;
  const pr=rd.pairings.find(p=>p.board===board && !p.bye); if(!pr) return;
  pr.result = pr.result===code ? null : code;
  if(t.format==='doubleko' && pr.matchId){
    const m=t.bracket.matches.find(x=>x.id===pr.matchId); if(m) m.result=pr.result;
    projectBracketToRounds(t);
  }
  saveDB(true);
}
function setByeType(t, roundNum, playerId, type){
  const rd=t.rounds.find(r=>r.number===roundNum); if(!rd) return;
  const pr=rd.pairings.find(p=>p.bye&&p.player===playerId); if(pr){ pr.byeType=type; saveDB(true); }
}

/* manual swap of two seats across the round */
function performSwap(t, roundNum, A, B){
  const rd=t.rounds.find(r=>r.number===roundNum); if(!rd) return;
  const getPid=sel=>{ const pr=rd.pairings.find(p=>p.board===sel.board); if(!pr) return null;
    return sel.seat==='w'?pr.white: sel.seat==='b'?pr.black: pr.player; };
  const setPid=(sel,pid)=>{ const pr=rd.pairings.find(p=>p.board===sel.board);
    if(pr.bye) pr.player=pid; else if(sel.seat==='w') pr.white=pid; else pr.black=pid; };
  const a=getPid(A), b=getPid(B); setPid(A,b); setPid(B,a);
  // reset results on affected boards
  rd.pairings.forEach(pr=>{ if(pr.board===A.board||pr.board===B.board){ if(!pr.bye) pr.result=null; } });
  saveDB(true);
}

/* withdraw / reactivate / late entry scoring */
function withdrawPlayer(t,id){ const p=t.players.find(x=>x.id===id); if(p){p.status='withdrawn';p.active=false;} saveDB(true); }
function reactivatePlayer(t,id){ const p=t.players.find(x=>x.id===id); if(p){p.status='active';p.active=true;} saveDB(true); }
function removePlayer(t,id){
  const used=(t.rounds||[]).some(r=>r.pairings.some(pr=> pr.player===id||pr.white===id||pr.black===id));
  if(used){ toast('Can’t delete — this player appears in pairings. Withdraw instead.','warn',3800); return false; }
  t.players=t.players.filter(p=>p.id!==id);
  t.players.forEach((p,i)=>p.seed=i+1);
  saveDB(true); return true;
}
function toggleRequestedBye(t,id,roundNum){
  const p=t.players.find(x=>x.id===id); if(!p) return;
  p.requestedByes=p.requestedByes||[];
  const i=p.requestedByes.indexOf(roundNum);
  if(i>=0) p.requestedByes.splice(i,1); else p.requestedByes.push(roundNum);
  saveDB(true);
}

/* re-pair / delete current round */
function repairRound(t){
  const last=t.rounds[t.rounds.length-1]; if(!last) return;
  t.rounds.pop();
  if(t.format==='swiss'){ const {pairings,warnings}=pairSwissRound(t,last.number); t.rounds.push({number:last.number,pairings}); warnings.forEach(w=>toast(w,'warn')); }
  else if(t.format==='knockout'){ if(last.number===1) t.rounds=buildKnockoutR1(t.players.filter(p=>p.status!=='withdrawn')); else { const nr=advanceKnockout(t); if(nr) t.rounds.push(nr);} }
  saveDB(true); toast('Round re-paired');
}
function deleteLastRound(t){ if((t.rounds||[]).length){ t.rounds.pop(); if(!t.rounds.length) t.status='setup'; saveDB(true);} }

/* bulk add players from pasted text (one per line, optional ", club") */
function bulkAddPlayers(t, text){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean); let n=0;
  lines.forEach(line=>{
    const parts=line.split(/\s*[,\t]\s*/);
    // "Name", "Name, Club", "Name, Club, Rating", or "Name, Rating"
    let name=parts[0], club='', rating=null;
    if(parts.length===2){ if(/^\d{2,4}$/.test(parts[1])) rating=parts[1]; else club=parts[1]; }
    else if(parts.length>=3){ club=parts[1]; rating=parts[2]; }
    if(addPlayer(t,name,club,rating)) n++;
  });
  return n;
}

/* ================= MINIMAL OFFLINE PDF WRITER (real .pdf files) ================= */
function _pf(n){ n=Math.round(n*100)/100; return (''+n); }
function _charW(c,bold){
  if(c===32) return 278;
  if(c>=48&&c<=57) return 556;
  if(c>=65&&c<=90) return bold?722:667;
  if(c>=97&&c<=122) return bold?556:500;
  if(c===46||c===44||c===58||c===59) return 278;
  return bold?556:500;
}
function PDFDoc(opts){
  opts=opts||{};
  this.land=!!opts.landscape;
  this.W=this.land?792:612; this.H=this.land?612:792;
  this.M=opts.margin||54;
  this.pages=[]; this._new();
}
PDFDoc.prototype._new=function(){ this.page={ops:[]}; this.pages.push(this.page); this.y=this.M; };
PDFDoc.prototype.newPage=function(){ this._new(); };
PDFDoc.prototype._enc=function(s){
  s=String(s==null?'':s).replace(/[\u2013\u2014]/g,'-').replace(/\u2192/g,'->').replace(/[\u00B7\u2022]/g,'-').replace(/[\r\n\t]/g,' ');
  let o='';
  for(let i=0;i<s.length;i++){ let c=s.charCodeAt(i); if(c>255) c=63; o+=String.fromCharCode(c); }
  return o.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
};
PDFDoc.prototype.textWidth=function(s,size,bold){ s=String(s==null?'':s); let w=0; for(let i=0;i<s.length;i++) w+=_charW(s.charCodeAt(i),bold); return w*size/1000; };
PDFDoc.prototype.fit=function(s,maxw,size,bold){ s=String(s==null?'':s); if(this.textWidth(s,size,bold)<=maxw) return s;
  while(s.length>1 && this.textWidth(s+'…',size,bold)>maxw) s=s.slice(0,-1); return s+'…'; };
PDFDoc.prototype.text=function(x,top,s,o){ o=o||{}; const size=o.size||11; const font=o.bold?'F2':'F1'; const col=o.color||[0,0,0];
  if(o.maxw) s=this.fit(s,o.maxw,size,o.bold);
  if(o.alignR) x=x-this.textWidth(s,size,o.bold); else if(o.alignC) x=x-this.textWidth(s,size,o.bold)/2;
  const yy=this.H-top-size;
  this.page.ops.push('q '+col[0]+' '+col[1]+' '+col[2]+' rg BT /'+font+' '+size+' Tf 1 0 0 1 '+_pf(x)+' '+_pf(yy)+' Tm ('+this._enc(s)+') Tj ET Q');
};
PDFDoc.prototype.line=function(x1,t1,x2,t2,o){ o=o||{}; const c=o.color||[0,0,0];
  this.page.ops.push('q '+c[0]+' '+c[1]+' '+c[2]+' RG '+(o.lw||1)+' w '+_pf(x1)+' '+_pf(this.H-t1)+' m '+_pf(x2)+' '+_pf(this.H-t2)+' l S Q'); };
PDFDoc.prototype.rect=function(x,top,w,h,o){ o=o||{}; let s='q ';
  if(o.fill) s+=o.fill[0]+' '+o.fill[1]+' '+o.fill[2]+' rg ';
  if(o.stroke) s+=o.stroke[0]+' '+o.stroke[1]+' '+o.stroke[2]+' RG '+(o.lw||1)+' w ';
  s+=_pf(x)+' '+_pf(this.H-top-h)+' '+_pf(w)+' '+_pf(h)+' re '+(o.fill&&o.stroke?'B':o.fill?'f':'S')+' Q';
  this.page.ops.push(s); };
PDFDoc.prototype.build=function(){
  const W=this.W,H=this.H,nP=this.pages.length, objs=[];
  const add=(num,body)=>objs.push({num,body});
  add(1,'<< /Type /Catalog /Pages 2 0 R >>');
  const kids=[]; for(let i=0;i<nP;i++) kids.push((5+i*2)+' 0 R');
  add(2,'<< /Type /Pages /Kids ['+kids.join(' ')+'] /Count '+nP+' >>');
  add(3,'<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>');
  add(4,'<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>');
  for(let i=0;i<nP;i++){
    const pnum=5+i*2, cnum=6+i*2, content=this.pages[i].ops.join('\n');
    add(pnum,'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+W+' '+H+'] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents '+cnum+' 0 R >>');
    add(cnum,'<< /Length '+content.length+' >>\nstream\n'+content+'\nendstream');
  }
  objs.sort((a,b)=>a.num-b.num);
  const total=objs[objs.length-1].num+1;
  let out='%PDF-1.4\n'; const off={};
  objs.forEach(o=>{ off[o.num]=out.length; out+=o.num+' 0 obj\n'+o.body+'\nendobj\n'; });
  const xref=out.length;
  out+='xref\n0 '+total+'\n0000000000 65535 f \n';
  for(let n=1;n<total;n++){ out+=(''+(off[n]||0)).padStart(10,'0')+' 00000 n \n'; }
  out+='trailer\n<< /Size '+total+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
  const bytes=new Uint8Array(out.length); for(let j=0;j<out.length;j++) bytes[j]=out.charCodeAt(j)&0xff;
  return { str:out, bytes:bytes, blob:new Blob([bytes],{type:'application/pdf'}) };
};
/* simple paginated table helper. cols:[{title,x,w,align}] rows:[[cell,...]] cell=string|{t,bold,color,align} */
PDFDoc.prototype.table=function(top,cols,rows,o){
  o=o||{}; const rowH=o.rowH||20, headH=o.headH||24, size=o.size||10.5;
  const left=this.M, right=this.W-this.M;
  let y=top;
  const drawHead=()=>{
    this.rect(left,y,right-left,headH,{fill:[0.93,0.94,0.96]});
    cols.forEach(c=>{ const cx=c.align==='r'?c.x+c.w-6:c.x+6; this.text(cx,y+7,c.title,{size:9.5,bold:true,color:[0.2,0.24,0.3],alignR:c.align==='r',maxw:c.w-10}); });
    y+=headH;
  };
  drawHead();
  rows.forEach((r,ri)=>{
    if(y+rowH>this.H-this.M-30){ this.newPage(); y=this.M; drawHead(); }
    if(ri%2===1) this.rect(left,y,right-left,rowH,{fill:[0.975,0.978,0.985]});
    cols.forEach((c,ci)=>{
      let cell=r[ci]; if(cell==null) cell='';
      let t=typeof cell==='object'?cell.t:cell, bold=cell&&cell.bold, color=(cell&&cell.color)||[0.1,0.12,0.16], al=(cell&&cell.align)||c.align;
      const cx=al==='r'?c.x+c.w-6:c.x+6;
      this.text(cx,y+6,String(t),{size,bold,color,alignR:al==='r',maxw:c.w-10});
    });
    this.line(left,y+rowH,right,y+rowH,{color:[0.85,0.87,0.9],lw:0.5});
    y+=rowH;
  });
  this.rect(left,top,right-left,y-top,{stroke:[0.75,0.78,0.82],lw:1});
  return y;
};

/* ================= ROUND COMMENTARY + RECAP (friendly chess narration) ================= */
function _scoresUpTo(t,n){
  const sc={}; t.players.forEach(p=>sc[p.id]=p.startScore||0);
  (t.rounds||[]).filter(r=>r.number<=n).forEach(rd=>rd.pairings.forEach(pr=>{
    if(pr.bye){ if(sc[pr.player]!=null) sc[pr.player]+= pr.byeType==='half'?t.config.pointsDraw : pr.byeType==='zero'?0 : t.config.pointsWin; return; }
    if(!pr.result) return;
    if(sc[pr.white]!=null) sc[pr.white]+=resultPoints(pr.result,'w',t.config);
    if(sc[pr.black]!=null) sc[pr.black]+=resultPoints(pr.result,'b',t.config);
  }));
  return sc;
}
function _ratingOf(t,id){ const p=pById(t,id); return (p&&p.rating>0)?p.rating:null; }
function _nm(t,id){ const p=pById(t,id); return p?p.name:'—'; }
function _pick(arr,seed){ return arr[Math.abs(seed)%arr.length]; }
function _list(names){ if(names.length===1) return names[0]; if(names.length===2) return names[0]+' and '+names[1];
  return names.slice(0,-1).join(', ')+', and '+names[names.length-1]; }

function roundCommentary(t,n){
  const rd=(t.rounds||[]).find(r=>r.number===n); if(!rd) return '';
  const rated=!!t.config.rated;
  const before=_scoresUpTo(t,n-1), after=_scoresUpTo(t,n);
  const games=rd.pairings.filter(p=>!p.bye && p.result);
  const total=rd.pairings.filter(p=>!p.bye).length;
  if(!games.length) return _pick([
    `Round ${n} is set and the clocks are ready — results still to come.`,
    `The boards are paired for round ${n}; we await the first results.`,
  ],n);
  const draws=games.filter(g=>g.result==='=').length;
  const decisive=games.length-draws;
  // upsets
  const upsets=[];
  games.forEach(g=>{
    if(g.result==='=') return;
    const wId=winnerOf(g); if(!wId) return; const lId=g.white===wId?g.black:g.white;
    let up=false, margin=(before[lId]||0)-(before[wId]||0);
    if(rated){ const wr=_ratingOf(t,wId), lr=_ratingOf(t,lId); if(wr!=null&&lr!=null&&lr-wr>=80) up=true; }
    if(!up && margin>=1) up=true;
    if(up) upsets.push({w:wId,l:lId,margin});
  });
  // leaders after
  const live=Object.keys(after).filter(id=>{const p=pById(t,id);return p&&p.status!=='withdrawn';});
  live.sort((a,b)=>after[b]-after[a]);
  const top=after[live[0]]; const leaders=live.filter(id=>Math.abs(after[id]-top)<1e-9);
  const sents=[];
  // opener
  if(n===1) sents.push(_pick([
    `And we're off! Round 1 saw the field break the ice across ${total} board${total!==1?'s':''}.`,
    `Round 1 is in the books — first blood drawn on ${total} board${total!==1?'s':''}.`,
    `The tournament roared to life in round 1 with ${total} game${total!==1?'s':''} underway.`,
  ],n));
  else sents.push(_pick([
    `Round ${n} delivered ${decisive} decisive game${decisive!==1?'s':''}${draws?` and ${draws} hard-fought draw${draws!==1?'s':''}`:''}.`,
    `In round ${n}, ${decisive} of ${games.length} games produced a winner${draws?`, with ${draws} splitting the point`:''}.`,
    `Round ${n}: ${decisive} decisive result${decisive!==1?'s':''}${draws?`, ${draws} draw${draws!==1?'s':''}`:''} — the standings keep shifting.`,
  ],n+decisive));
  // upset highlight
  if(upsets.length){
    const u=upsets.sort((a,b)=>b.margin-a.margin)[0];
    sents.push(_pick([
      `The upset of the round? ${_nm(t,u.w)} toppling ${_nm(t,u.l)} — a result few saw coming.`,
      `${_nm(t,u.w)} pulled off a giant-killing against ${_nm(t,u.l)}, the kind of win that makes a tournament.`,
      `Eyebrows raised as ${_nm(t,u.w)} got the better of ${_nm(t,u.l)} — a statement victory.`,
    ],n+upsets.length));
  } else if(draws===games.length && games.length>1){
    sents.push(`A cagey round — every game ended peacefully, with no one willing to blink first.`);
  }
  // leaders
  const lead=_list(leaders.slice(0,3).map(id=>_nm(t,id)));
  if(leaders.length===1) sents.push(_pick([
    `That leaves ${lead} alone at the summit on ${fmtScore(top)}.`,
    `${lead} now stands clear at the top with ${fmtScore(top)}.`,
    `Out front: ${lead}, leading the pack on ${fmtScore(top)}.`,
  ],n+leaders.length));
  else sents.push(_pick([
    `A logjam at the top: ${lead} share the lead on ${fmtScore(top)}.`,
    `It's tight up top — ${lead} are tied on ${fmtScore(top)}.`,
    `${lead} sit level at the front with ${fmtScore(top)} apiece.`,
  ],n+leaders.length));
  return sents.join(' ');
}
function tournamentRecap(t){
  const rounds=(t.rounds||[]);
  const played=rounds.filter(r=>roundComplete(t,r)).length;
  const {arr}=getStandings(t);
  const champ=arr[0];
  const done = rounds.length>0 && roundComplete(t,rounds[rounds.length-1]) && (t.format==='swiss'? (t.config.rounds? rounds.length>=t.config.rounds : true) : true);
  const fld=activeCount(t);
  const where = t.config.location ? ` at ${t.config.location}` : '';
  const intro = `${esc(t.name)} brought together ${fld} player${fld!==1?'s':''} for ${rounds.length} round${rounds.length!==1?'s':''} of ${FORMATS[t.format].name.toLowerCase()} chess${where}.`;
  let crown='';
  if(champ){
    const second=arr[1];
    const margin = second? +(champ.score-second.score).toFixed(2) : 0;
    if(done) crown = `When the dust settled, ${esc(champ.name)} stood tallest, finishing on ${fmtScore(champ.score)}${second?` — ${margin>0?`${fmtScore(margin)} clear of ${esc(second.name)}`:`edging out ${esc(second.name)} on tiebreaks`}`:''}.`;
    else crown = `As it stands, ${esc(champ.name)} leads the way on ${fmtScore(champ.score)}${second&&margin>0?`, ${fmtScore(margin)} ahead of ${esc(second.name)}`:''} — but there's chess yet to be played.`;
  }
  const close = done ? _pick([`A worthy champion, a grateful field, and memories made over the board. Until the next one.`,
    `Hats off to every competitor — and to a tournament well played.`],rounds.length)
    : `The story is still being written. Stay tuned.`;
  return { intro, crown, close, done, champ };
}

function pname(t,id){ const p=pById(t,id); return p?esc(p.name):'—'; }

/* =========================== ROUTER =========================== */
function render(){
  const t=activeT();
  // remember scroll so entering a result (or any same-view update) doesn't jump to the top
  const prevMain=document.querySelector('.main');
  const savedScroll=prevMain?prevMain.scrollTop:0;
  const sig=UI.view+'|'+UI.tab+'|'+(t?t.id:'');
  const keepScroll=(sig===UI._sig);
  if(UI.view==='create'){ el('app').innerHTML = shellTop(viewCreate(), false); }
  else if(!t || UI.view==='home'){ UI.view='home'; el('app').innerHTML = shellTop(viewHome(), false); }
  else { el('app').innerHTML = shellApp(t); }
  const pr=el('present-root'); if(pr) pr.innerHTML = (UI.present&&t) ? presentOverlay(t) : '';
  attachDynamic();
  const newMain=document.querySelector('.main');
  if(newMain) newMain.scrollTop = keepScroll ? savedScroll : 0;
  UI._sig=sig;
}
function presentOverlay(t){
  const rounds=t.rounds||[];
  const mode=UI.present.mode||'pairings';
  let rn=UI.present.round||currentRoundNumber(t); if(rn>rounds.length) rn=rounds.length; if(rn<1) rn=1;
  const fs = (typeof document!=='undefined' && document.fullscreenElement) ? I.minimize : I.maximize;
  const bar=`<div class="present-bar">
     <div class="pb-brand">${I.knight||I.bracket}<span class="pb-name">${esc(t.name)}</span></div>
     <div class="pb-seg">
       <button class="${mode==='pairings'?'on':''}" data-act="present-mode" data-mode="pairings">Pairings</button>
       <button class="${mode==='standings'?'on':''}" data-act="present-mode" data-mode="standings">Standings</button>
     </div>
     ${mode==='pairings'&&rounds.length?`<div class="pb-round">
        <button data-act="present-round" data-dir="prev" ${rn<=1?'disabled':''}>${I.chevron}</button>
        <span>Round ${rn}</span>
        <button data-act="present-round" data-dir="next" ${rn>=rounds.length?'disabled':''}>${I.chevron}</button>
      </div>`:'<div></div>'}
     <div class="pb-actions">
       <button class="pb-btn" data-act="present-fullscreen" title="Fullscreen on the projector">${fs} Full screen</button>
       <button class="pb-btn" data-act="present-close" title="Exit display">${I.x} Exit</button>
     </div>
   </div>`;
  let body='';
  if(mode==='pairings'){
    const rd=rounds.find(r=>r.number===rn);
    if(!rd){ body=`<div class="present-empty">No pairings yet</div>`; }
    else {
      const games=rd.pairings.filter(p=>!p.bye).map(pr=>`
        <div class="pp-card ${pr.result?'done':''}">
          <div class="pp-bd">${pr.board}</div>
          <div class="pp-names">
            <div class="pp-row"><span class="pp-disc w"></span><span class="pp-nm">${pname(t,pr.white)}</span></div>
            <div class="pp-vs">vs</div>
            <div class="pp-row"><span class="pp-disc b"></span><span class="pp-nm">${pname(t,pr.black)}</span></div>
          </div>
        </div>`).join('');
      const byes=rd.pairings.filter(p=>p.bye).map(p=>`<span class="pp-bye">${pname(t,p.player)} — bye</span>`).join('');
      const n=rd.pairings.filter(p=>!p.bye).length;
      body=`<div class="present-h">Round ${rn} — find your board</div>
        <div class="pp-grid cols-${n>16?4:n>9?3:n>4?2:1}">${games}</div>
        ${byes?`<div class="pp-byes">${byes}</div>`:''}`;
    }
  } else {
    const {arr,tbOn}=getStandings(t);
    const rated=!!t.config.rated;
    const rows=arr.slice(0,40).map(s=>`<div class="ps-row ${s.rank<=3?'top top'+s.rank:''}">
        <span class="ps-rank">${s.rank}</span>
        <span class="ps-name">${esc(s.name)}</span>
        ${rated?`<span class="ps-rt">${pById(t,s.id)&&pById(t,s.id).rating>0?pById(t,s.id).rating:''}</span>`:''}
        <span class="ps-score">${fmtScore(s.score)}</span>
      </div>`).join('');
    body=`<div class="present-h">Standings — after round ${currentRoundNumber(t)}</div>
      <div class="ps-list">${rows}</div>`;
  }
  return `<div class="present" data-act="">${bar}<div class="present-body">${body}</div></div>`;
}

function rail(t){
  const cur=currentRoundNumber(t);
  const items=[
    ['players','Players',I.users, activeCount(t)],
    ['pairings','Pairings',I.shuffle, cur||''],
    ['results','Enter Results',I.edit, ''],

    ['standings','Standings',I.trophy, ''],
    ['recap','Recap',I.edit, ''],
    ['crosstable','Cross-table',I.grid, ''],
    ['print','Print & Export',I.printer, ''],
    ['settings','Settings',I.gear, ''],
  ];
  const nav=items.map(([k,label,icon,ct])=>
    `<div class="navitem ${UI.tab===k?'on':''}" data-act="tab" data-tab="${k}">

     </div>`).join('');

        </div>
        <div style="padding:10px 12px 4px"><button class="linkish" data-act="open-about" style="color:var(--faint);font-size:11.5px">About Gambit</button></div>
      </div>
    </aside>`;
}
function mainByTab(t){
  const wide = (UI.tab==='crosstable'||UI.tab==='standings'||UI.tab==='bracket');
  let inner;
  switch(UI.tab){
    case 'pairings': inner=viewPairings(t); break;
    case 'results': inner=viewResults(t); break;
    case 'bracket': inner=viewBracket(t); break;
    case 'standings': inner=viewStandings(t); break;
    case 'recap': inner=viewRecap(t); break;
    case 'crosstable': inner=viewCrosstable(t); break;
    case 'print': inner=viewPrint(t); break;
    case 'settings': inner=viewSettings(t); break;
    default: inner=viewPlayers(t);
  }
  return `<div class="wrap ${wide?'wide':''}">
     <button class="btn btn-icon menu-btn no-print" data-act="rail-toggle" style="margin-bottom:14px">${I.menu}</button>
     ${inner}</div>`;
}
function botnav(t){
  const cur=currentRoundNumber(t);
  const overflow=['players','recap','crosstable','print','settings'];
  const items=[
    ['pairings','Pairings',I.shuffle, cur||''],
    ['results','Results',I.edit, ''],
    ['standings','Table',I.trophy, ''],
    ['bracket','Bracket',I.bracket, ''],
  ];
  const main=items.map(([k,label,icon,ct])=>
    `<button class="${UI.tab===k?'on':''}" data-act="tab" data-tab="${k}">
        ${icon}${ct!==''&&ct!==0?`<span class="bn-ct">${ct}</span>`:''}<span>${label}</span>
     </button>`).join('');
  const moreOn=overflow.includes(UI.tab)?'on':'';
  const more=`<button class="${moreOn}" data-act="rail-toggle">${I.menu}<span>More</span></button>`;
  return `<nav class="botnav no-print">${main}${more}</nav>`;
}

/* =========================== PLAYERS =========================== */
function viewPlayers(t){
  const started=(t.rounds||[]).length>0;
  const isTeam=FORMATS[t.format].team;
  const q=(UI.playerSearch||'').toLowerCase();
  let players=[...t.players];
  if(q) players=players.filter(p=>p.name.toLowerCase().includes(q)||(p.club||'').toLowerCase().includes(q));
  players.sort((a,b)=>a.seed-b.seed);

  const head=`<div class="phead">
     <div><h1>Players</h1><div class="sub">${activeCount(t)} active${t.players.length!==activeCount(t)?` · ${t.players.length-activeCount(t)} withdrawn`:''} · seed order</div></div>
     <div class="phead-actions">
       <button class="btn btn-ghost btn-sm" data-act="bulk-open">${I.list} Bulk add</button>
       ${!started?'':''}
       <button class="btn btn-ghost btn-sm" data-act="randomize-seeds" title="Shuffle seeds">${I.shuffle} Seeds</button>
     </div>
   </div>`;

  const rated=!!t.config.rated;
  const addbar=`<div class="card card-pad" style="margin-bottom:18px">
     <div class="row3" style="grid-template-columns:1.4fr 1fr ${rated?'90px ':''}auto;align-items:end;gap:12px">
       <div class="field" style="margin:0"><label>Add player</label>
         <input class="inp" id="add-name" placeholder="Full name" data-enter="add-player"></div>
       <div class="field" style="margin:0"><label>Club / Affiliation <span style="color:var(--faint);font-weight:400">(optional)</span></label>
         <input class="inp" id="add-club" placeholder="Club" data-enter="add-player"></div>
       ${rated?`<div class="field" style="margin:0"><label>USCF rating</label>
         <input class="inp" id="add-rating" placeholder="e.g. 1450" inputmode="numeric" data-enter="add-player"></div>`:''}
       <button class="btn btn-pri" data-act="add-player" style="height:43px">${I.plus} Add</button>
     </div>
     ${rated?`<div class="note" style="margin-top:14px">${I.star}<div>Rated event: enter each player's <b>USCF rating</b> (leave blank for unrated players). Estimated rating changes and tournament performance appear in Standings as games are played.</div></div>`:''}
     ${started?`<div class="note gold" style="margin-top:14px">${I.info}<div>This event is underway. New players are added as <b>late entries</b> starting in round ${currentRoundNumber(t)+1}. Set a starting score from the player's row if needed.</div></div>`:''}
   </div>`;

  const search=t.players.length>6?`<div class="searchbar" style="margin-bottom:14px">${I.search}
      <input id="player-search" placeholder="Search players…" value="${esc(UI.playerSearch)}"></div>`:'';

  let body;
  if(!t.players.length){
    body=`<div class="empty">${I.users}<h3>No players yet</h3><p>Add players above, or use Bulk add to paste a list.</p></div>`;
  } else {
    const rows=players.map(p=>{
      const tags=[];
      if(p.status==='withdrawn') tags.push('<span class="tag tag-wd">Withdrawn</span>');
      else tags.push('<span class="tag tag-active">Active</span>');
      if(p.addedRound>1) tags.push(`<span class="tag tag-late">Late · R${p.addedRound}</span>`);
      if((p.requestedByes||[]).length) tags.push(`<span class="tag tag-bye">Bye R${p.requestedByes.join(',')}</span>`);
      const actions = p.status==='withdrawn'
        ? `<button class="btn-icon" data-act="reactivate" data-id="${p.id}" title="Reactivate">${I.play}</button>`
        : `<button class="btn-icon" data-act="player-menu" data-id="${p.id}" title="Options">${I.edit}</button>
           <button class="btn-icon" data-act="withdraw" data-id="${p.id}" title="Withdraw">${I.pause}</button>`;
      const del=!started?`<button class="btn-icon" data-act="remove-player" data-id="${p.id}" title="Remove">${I.trash}</button>`:'';
      const team = isTeam ? (t.config.teamA.includes(p.id)?`<span class="tag" style="background:var(--green-dim);color:var(--green-bright)">A</span>`

      return `<tr>
        <td class="num" style="color:var(--faint);width:42px">${p.seed}</td>
        <td><div class="pname" style="font-weight:600">${esc(p.name)}</div></td>
        <td class="pclub" style="color:var(--muted)">${esc(p.club||'')}</td>
        ${rated?`<td class="center">${p.rating>0?`<span class="rchip">${p.rating}</span>`:'<span class="rchip unr">Unrated</span>'}</td>`:''}
        ${isTeam?`<td class="center">${team}</td>`:''}
        <td>${tags.join(' ')}</td>
        <td class="center no-print" style="white-space:nowrap">${actions}${del}</td>
      </tr>`;
    }).join('');
    body=`<div class="card"><div style="overflow:auto"><table class="tbl">
       <thead><tr><th>#</th><th>Name</th><th>Club</th>${rated?'<th class="center">Rating</th>':''}${isTeam?'<th class="center">Team</th>':''}<th>Status</th><th class="center no-print">Actions</th></tr></thead>
       <tbody>${rows}</tbody></table></div></div>`;
  }

  let teamPanel='';
  if(isTeam){
    const aN=t.config.teamA.length, bN=t.config.teamB.length;
    teamPanel=`<div class="note" style="margin-top:18px">${I.users}<div><b>${esc(t.config.teamAName)}</b>: ${aN} · <b>${esc(t.config.teamBName)}</b>: ${bN}. Each player on one team plays everyone on the other. Assign teams using the buttons in each row.</div></div>`;
  }
  return head + addbar + search + body + teamPanel;
}

/* =========================== PAIRINGS =========================== */
function viewPairings(t){
  const stats=computeStats(t);
  const rounds=t.rounds||[];
  const cur=currentRoundNumber(t);
  const scheduled=(t.format!=='swiss');

  // header + toolbar
  const head=`<div class="phead">
     <div><h1>Pairings</h1><div class="sub">${esc(FORMATS[t.format].name)} · ${rounds.length?`${rounds.length} round${rounds.length>1?'s':''} generated`:'not started'}</div></div>
     <div class="phead-actions">${pairingToolbar(t)}</div>
   </div>`;

  if(!rounds.length){
    const enough=activeCount(t)>=2;
    return head + `<div class="empty">${I.shuffle}<h3>Ready when you are</h3>
       <p>${enough?`Generate round 1 to pair your ${activeCount(t)} players.`:'Add at least 2 players to begin.'}</p>
       <div style="margin-top:20px">${enough?startButton(t):''}</div></div>`;

  // round tabs

  }).join('');
  const canNext = canGenerateNext(t);

  const roundbar=`<div class="round-bar no-print">${tabs}${nextTab}</div>`;

  if(UI.swapSel!==null){
    swapBanner=`<div class="note gold no-print" style="margin-bottom:14px">${I.swap}<div>Swap mode — pick a second player to switch their pairing. <button class="linkish" data-act="cancel-swap" style="color:var(--gold);text-decoration:underline">Cancel</button></div></div>`;
  }

  const footer=`<div class="ptoolbar no-print" style="margin-top:22px">
      <span class="mono" style="color:var(--muted);font-size:12.5px">${inCount}/${rd.pairings.length} results in</span>
      <div style="flex:1"></div>
      <button class="btn btn-ghost btn-sm" data-act="swap-mode">${I.swap} Manual swap</button>
      ${t.format==='swiss'?`<button class="btn btn-ghost btn-sm" data-act="repair-round">${I.shuffle} Re-pair</button>`:''}
      <button class="btn btn-pri btn-sm" data-act="tab" data-tab="results">${I.edit} Enter results</button>
      ${rd.number===cur?`<button class="btn btn-danger btn-sm" data-act="delete-round">${I.trash} Delete round</button>`:''}
      ${rd.number===cur&&canNext?`<button class="btn btn-pri btn-sm" data-act="generate-next">${complete?'':I.info} Round ${cur+1} ${I.chevron}</button>`:''}
    </div>`;

  return head + roundbar + swapBanner + grid + footer;

function viewResults(t){
  const stats=computeStats(t);
  const rounds=t.rounds||[];
  const cur=currentRoundNumber(t);
  const head=`<div class="phead">
     <div><h1>Enter Results</h1><div class="sub">Tap a result for each board — pairings update live</div></div>

  const roundbar=`<div class="round-bar no-print">${tabs}</div>`;

     <div class="rp-bar"><div class="rp-fill" style="width:${pct}%"></div></div>
     <div class="rp-txt">${inCount} of ${total} entered${inCount===total?' · round complete':''}</div></div>`;

function pairingToolbar(t){
  const rounds=t.rounds||[];
  if(!rounds.length) return startButton(t);
  return `<button class="btn btn-ghost btn-sm" data-act="present-open" data-mode="pairings" title="Show on a TV/projector for players">${I.monitor} Display</button>
     <button class="btn btn-ghost btn-sm" data-act="print-pairings" title="Printable pairing sheet">${I.printer} Sheet</button>
     <button class="btn btn-ghost btn-sm" data-act="tab" data-tab="results">${I.edit} Results</button>`;
}
function startButton(t){
  if(activeCount(t)<2) return '';
  if(t.format==='swiss') return `<button class="btn btn-pri" data-act="generate-next">${I.bolt} Generate Round 1</button>`;
  return `<button class="btn btn-pri" data-act="generate-schedule">${I.bolt} Generate Pairings</button>`;
}
function canGenerateNext(t){
  const rounds=t.rounds||[];
  if(!rounds.length) return true;
  const last=rounds[rounds.length-1];
  if(!roundComplete(t,last)) return false;
  if(t.format==='swiss') return rounds.length < (t.config.rounds||99);
  if(t.format==='knockout'){
    // more rounds exist if last round has >1 game (i.e. not the final)
    return last.pairings.filter(p=>!p.bye).length>1;
  }
  return false; // rr/quad/scheveningen scheduled up front; doubleko auto-advances via projection
}

function boardCard(t,rd,pr,stats,entry){
  if(pr.bye){
    const half=pr.byeType==='half', zero=pr.byeType==='zero';
    return `<div class="board bye">
       <div class="board-top"><div class="board-no">${I.flag} Bye</div>
         <div class="board-flags no-print">
           ${entry?`<select class="inp" style="padding:4px 8px;font-size:11px;width:auto" data-act="set-bye" data-pid="${pr.player}">
             <option value="full" ${!half&&!zero?'selected':''}>Full point</option>
             <option value="half" ${half?'selected':''}>Half point</option>
             <option value="zero" ${zero?'selected':''}>Zero</option>
           </select>`:''}
         </div></div>
       <div class="bye-badge"><span class="ic">${I.check}</span>
         <div><div style="font-weight:600;color:var(--ink)">${pname(t,pr.player)}</div>
         <div style="font-size:11.5px;color:var(--muted)">receives a ${half?'½-point':zero?'zero-point':'full-point'} bye</div></div></div>
     </div>`;
  }
  const wS=stats[pr.white], bS=stats[pr.black];
  const resolved=!!pr.result;
  const flags=[];
  if(pr._rematch) flags.push(`<span class="tag flag-warn" title="These players have already met">${I.info} Rematch</span>`);
  const rated=!!t.config.rated;
  const seat=(side)=>{
    const id=side==='w'?pr.white:pr.black;
    const s=side==='w'?wS:bS;
    const swapOn=UI.swapSel!==null;
    const isSel=UI.swapSel && UI.swapSel.board===pr.board && UI.swapSel.seat===side;
    const pl=pById(t,id);
    const rt = rated ? `<span class="rt">${pl&&pl.rating>0?pl.rating:'Unr'}</span>` : '';
    const oc = pr.result ? resultOutcome(pr.result, side) : null;
    const rcls = oc ? (oc.o==='W'?'rwin':oc.o==='D'?'rdraw':'rloss') : '';
    return `<div class="seat ${side} ${rcls} ${isSel?'swapsel':''}" ${swapOn?`data-act="swap-pick" data-board="${pr.board}" data-seat="${side}" style="cursor:pointer"`:''}>
       <div class="disc"></div>
       <div class="who"><div class="n">${pname(t,id)}${rt}</div>
         <div class="sc">${fmtScore(s?s.score:0)} pts${s&&s.club?' · '+esc(s.club):''}</div></div>
       <div class="clr">${side==='w'?'White':'Black'}</div>
     </div>`;
  };
  const r=pr.result;
  let bottom='';
  if(entry){
    bottom=`<div class="board-result"><div class="res-btns">
       <button class="res-btn ${r==='1-0'?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="1-0">1–0</button>
       <button class="res-btn draw ${r==='='?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="=">½–½</button>
       <button class="res-btn ${r==='0-1'?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="0-1">0–1</button>
     </div>
     <div class="res-more no-print">
       <button class="${r==='0F'?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="0F">White forfeit</button>
       <button class="${r==='1F'?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="1F">Black forfeit</button>
       <button class="${r==='XX'?'on':''}" data-act="set-result" data-board="${pr.board}" data-code="XX">Double FF</button>
       ${r?`<button data-act="set-result" data-board="${pr.board}" data-code="clear">${I.x} Clear</button>`:''}
     </div></div>`;
  } else if(resolved){
    const label = r==='='?'½ – ½' : r==='1-0'?'1 – 0' : r==='0-1'?'0 – 1' : r==='1F'?'Black forfeit' : r==='0F'?'White forfeit' : r==='XX'?'Double forfeit' : '';
    bottom=`<div class="board-status done">${I.check} ${label}</div>`;
  } else {
    bottom=`<div class="board-status pend">Awaiting result · <button class="linkish" data-act="tab" data-tab="results" style="color:var(--green-bright)">enter in Results ${I.chevron}</button></div>`;
  }
  return `<div class="board ${resolved?'resolved':''}">
     <div class="board-top">
       <div class="board-no"><span class="sq"></span>${pr.board}</div>
       <div class="board-flags">${flags.join('')}</div>
     </div>
     ${seat('w')}<div style="height:1px;background:var(--line-soft);margin:0 14px"></div>${seat('b')}
     ${bottom}
   </div>`;
}

/* =========================== CROSS-TABLE =========================== */
function viewCrosstable(t){
  const head=`<div class="phead"><div><h1>Cross-table</h1><div class="sub">${esc(FORMATS[t.format].name)}</div></div>
     <div class="phead-actions"><button class="btn btn-ghost btn-sm" data-act="print-wallchart">${I.printer} Print wall chart</button></div></div>`;
  if(!(t.rounds||[]).length) return head+`<div class="empty">${I.grid}<h3>Nothing to show yet</h3><p>Play a round to populate the table.</p></div>`;
  const rrFamily=['rr','drr','quad','scheveningen'].includes(t.format);
  if(rrFamily && t.format==='quad') return head+quadTables(t);
  if(rrFamily) return head+crossMatrix(t, t.players.filter(p=>p.status!=='withdrawn').map(p=>p.id));
  return head+wallChart(t);
}
function crossMatrix(t, ids){
  const {stats}=getStandings(t);
  const ord=[...ids].sort((a,b)=>(stats[b].score-stats[a].score)||(a&&stats[a].seed)-(stats[b].seed));
  // build result lookup id->id->symbol
  const map={};
  (t.rounds||[]).forEach(rd=>rd.pairings.forEach(pr=>{
    if(pr.bye) return;
    const wo=resultOutcome(pr.result,'w'), bo=resultOutcome(pr.result,'b');
    if(!pr.result) return;
    map[pr.white]=map[pr.white]||{}; map[pr.black]=map[pr.black]||{};
    map[pr.white][pr.black]=wo.o==='W'?'1':wo.o==='D'?'½':'0';
    map[pr.black][pr.white]=bo.o==='W'?'1':bo.o==='D'?'½':'0';
  }));
  const head=`<tr><th>#</th><th>Player</th>${ord.map((_,i)=>`<th class="center">${i+1}</th>`).join('')}<th class="center">Pts</th></tr>`;
  const rows=ord.map((id,i)=>{
    const cells=ord.map((oid,j)=>{
      if(oid===id) return `<td class="center" style="background:var(--bg-2);color:var(--faint)">×</td>`;
      const v=(map[id]||{})[oid];
      const col=v==='1'?'var(--green-bright)':v==='0'?'var(--red)':v==='½'?'var(--gold)':'var(--faint)';
      return `<td class="center num" style="color:${col}">${v||'·'}</td>`;
    }).join('');
    return `<tr><td class="num center" style="color:var(--faint)">${i+1}</td>
       <td style="font-weight:600;white-space:nowrap">${esc(stats[id].name)}</td>${cells}
       <td class="center"><span class="score-pill">${fmtScore(stats[id].score)}</span></td></tr>`;
  }).join('');
  return `<div class="xt-wrap"><table class="tbl xt"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
}
function quadTables(t){
  // infer quads from config grouping stored at schedule time, else from round1 pairings clusters
  const groups=t.config.quadGroups||[];
  if(!groups.length) return crossMatrix(t, t.players.filter(p=>p.status!=='withdrawn').map(p=>p.id));
  return groups.map((g,i)=>`<div style="margin-bottom:24px"><div class="rail-h" style="padding:0 0 10px">Quad ${i+1}</div>${crossMatrix(t,g)}</div>`).join('');
}
function wallChart(t){
  const {arr}=getStandings(t);
  const nR=(t.rounds||[]).length;
  // opponent+result per round per player
  const detail={};
  t.players.forEach(p=>detail[p.id]=[]);
  (t.rounds||[]).forEach((rd,ri)=>{
    rd.pairings.forEach(pr=>{
      if(pr.bye){ detail[pr.player][ri]={txt:'BYE',col:'var(--blue)'}; return; }
      if(!pr.result){ detail[pr.white]&&(detail[pr.white][ri]={txt:'—',col:'var(--faint)'}); detail[pr.black]&&(detail[pr.black][ri]={txt:'—',col:'var(--faint)'}); return; }
      const wo=resultOutcome(pr.result,'w'), bo=resultOutcome(pr.result,'b');
      const sym=o=>o==='W'?'+':o==='D'?'=':'−';
      const col=o=>o==='W'?'var(--green-bright)':o==='D'?'var(--gold)':'var(--red)';
      if(detail[pr.white]) detail[pr.white][ri]={txt:`${sym(wo.o)}${pseed(t,pr.black)}w`,col:col(wo.o)};
      if(detail[pr.black]) detail[pr.black][ri]={txt:`${sym(bo.o)}${pseed(t,pr.white)}b`,col:col(bo.o)};
    });
  });
  const rh=Array.from({length:nR},(_,i)=>`<th class="center">R${i+1}</th>`).join('');
  const rows=arr.map(s=>{
    const cells=Array.from({length:nR},(_,i)=>{ const d=detail[s.id]&&detail[s.id][i]; return `<td class="center num" style="color:${d?d.col:'var(--faint)'}">${d?d.txt:''}</td>`;}).join('');
    return `<tr><td class="center"><span class="rank ${s.rank<=3?'rank-'+s.rank:''}">${s.rank}</span></td>
       <td style="font-weight:600;white-space:nowrap">${esc(s.name)}</td>${cells}
       <td class="center"><span class="score-pill">${fmtScore(s.score)}</span></td></tr>`;
  }).join('');
  return `<div class="note" style="margin-bottom:14px">${I.info}<div>Wall chart shows each player's result by round: <b style="color:var(--green-bright)">+</b> win, <b style="color:var(--gold)">=</b> draw, <b style="color:var(--red)">−</b> loss, followed by opponent seed and color.</div></div>
   <div class="xt-wrap"><table class="tbl xt"><thead><tr><th class="center">#</th><th>Player</th>${rh}<th class="center">Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* shared seat (used by knockout cards + double-elim cards) */
function mmSeat(t,id,o){

  const cls=(o.win?'win ':'')+(o.lose?'lose ':'')+(o.pick?'pickable':'');
  let pa='';
  if(o.pick){
    pa=o.pick.matchId
      ? ` data-act="bracket-win" data-matchid="${o.pick.matchId}" data-win="${o.pick.win}" title="Advance ${esc(p?p.name:'')}"`
      : ` data-act="bracket-win" data-round="${o.pick.round}" data-board="${o.pick.board}" data-win="${o.pick.win}" title="Advance ${esc(p?p.name:'')}"`;
  }
  return `<div class="mm-seat ${cls}"${pa}><span class="mm-seed">${seed}</span><span class="mm-name">${p?esc(p.name):'—'}</span><span class="mm-check">${I.check}</span></div>`;
}
/* instruction banner + legend + zoom + (knockout) create-next button */
function mmShell(t){

    }
  }
  return `<div class="mm-howto">${I.info}<div>The winner of each game moves <b>one step to the right</b>.${isKO?' <b>Tap a player</b> to make them the winner and send them forward.':' Enter results on the Pairings tab and they appear here.'} Slide sideways to see later rounds and the champion.</div></div>
   <div class="mm-bar">
     <div class="mm-legend">
       <span><span class="sw win"></span> Winner advances</span>
       <span><span class="sw tbd"></span> Waiting for players</span>
     </div>
     ${nextBtn}
     <div class="mm-zoom">
       <button class="zb" data-act="bracket-zoom" data-dir="out" aria-label="Zoom out">−</button>

       <button class="zb" data-act="bracket-zoom" data-dir="in" aria-label="Zoom in">+</button>
     </div>
   </div>`;
