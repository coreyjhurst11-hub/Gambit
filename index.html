/* ---- single elimination: true bracket tree ---- */
function isDecidedM(m){ if(!m||m.pending) return false; if(m.bye) return true; return !!winnerOf(m); }
function champWinner(t,totalR){
  const rounds=t.rounds||[]; const last=rounds[rounds.length-1];
  if(rounds.length>=totalR && last && last.pairings.length===1){
    const pr=last.pairings[0]; return pr.bye?pr.player:winnerOf(pr);
  }
  return null;
}
function koBracket(t){
  const rounds=t.rounds||[];
  if(!rounds.length) return emptyBracket();
  const size=nextPow2(Math.max(2,activeCount(t)));
  const totalR=Math.max(1,Math.round(Math.log2(size)));
  const r0=rounds[0].pairings.length;
  // matches per round: real pairings where played, else pending placeholders
  const byRound=[];
  for(let r=0;r<totalR;r++){
    const count=Math.max(1,Math.round(r0/Math.pow(2,r)));
    byRound[r] = (r<rounds.length) ? rounds[r].pairings.slice() : Array.from({length:count},()=>({pending:true}));
  }
  // geometry
  const CW=240, CH=76, VG=30, COLG=82, TOP=54, BOT=22, CHAMPW=200;
  const unit=CH+VG;
  const cy=[];
  cy[0]=byRound[0].map((_,i)=>TOP+i*unit+CH/2);
  for(let r=1;r<totalR;r++){
    const prev=cy[r-1], a=[];
    for(let i=0;i<byRound[r].length;i++){ const p1=prev[2*i], p2=prev[2*i+1]; a.push(p2!=null?(p1+p2)/2:p1); }
    cy[r]=a;
  }
  const colX=r=>r*(CW+COLG);
  const stageH=TOP+byRound[0].length*unit-VG+BOT;
  const champX=colX(totalR-1)+CW+COLG;
  const stageW=champX+CHAMPW+12;
  // connectors
  let paths='';
  for(let r=0;r<totalR-1;r++){
    for(let i=0;i<byRound[r].length;i++){
      const fx=colX(r)+CW, fy=cy[r][i];
      const cxL=colX(r+1), cyy=cy[r+1][Math.floor(i/2)];
      const midX=fx+COLG/2;
      const done=isDecidedM(byRound[r][i]);
      paths+=`<path class="mm-path ${done?'done':''}" d="M${fx} ${fy} H${midX} V${cyy} H${cxL}"/>`;
    }
  }
  const fy=cy[totalR-1][0];
  paths+=`<path class="mm-path ${champWinner(t,totalR)?'done':''}" d="M${colX(totalR-1)+CW} ${fy} H${champX}"/>`;
  // headers
  let heads='';
  for(let r=0;r<totalR;r++){
    const fromEnd=totalR-1-r;
    const title=fromEnd===0?'Final':fromEnd===1?'Semifinals':fromEnd===2?'Quarterfinals':('Round '+(r+1));
    const sub=r<rounds.length?'':'upcoming';
    heads+=`<div class="mm-rh" style="left:${colX(r)}px;width:${CW}px">${title}${sub?`<span class="sub">${sub}</span>`:''}</div>`;
  }
  heads+=`<div class="mm-rh" style="left:${champX}px;width:${CHAMPW}px;color:var(--gold)">Champion</div>`;
  // cards
  let cards='';
  for(let r=0;r<totalR;r++){
    const rd=rounds[r];
    byRound[r].forEach((m,i)=>{ cards+=koCard(t,m,rd,colX(r),cy[r][i]-CH/2,CW,CH); });
  }
  const champ=champWinner(t,totalR);
  cards+=`<div class="mm-champ" style="left:${champX}px;top:${fy-CH/2-12}px;width:${CHAMPW}px;min-height:${CH+24}px">
     <div class="crown">${I.crown}</div><div class="cl">Champion</div>
     ${champ?`<div class="cn">${pname(t,champ)}</div>`:`<div class="ctbd">To be decided</div>`}</div>`;
  const inner=`<svg class="mm-svg" width="${stageW}" height="${stageH}" viewBox="0 0 ${stageW} ${stageH}" preserveAspectRatio="none">${paths}</svg>${heads}${cards}`;
  const z = (koBracket._fit ? Math.min(1, koBracket._fit/stageW) : (UI.bracketZoom||1));
  const stage=`<div class="bracket-scroll"><div class="mm-sizer" style="width:${Math.round(stageW*z)}px;height:${Math.round(stageH*z)}px">
     <div class="mm-stage" style="width:${stageW}px;height:${stageH}px;transform:scale(${z})">${inner}</div></div></div>`;
  return koBracket._fit ? stage : (mmShell(t)+stage);
}
function koCard(t,m,rd,x,y,w,h){
  const style=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  if(!m||m.pending) return `<div class="mm-card" style="${style}">${mmSeat(t,null,{})}${mmSeat(t,null,{})}</div>`;
  if(m.bye) return `<div class="mm-card bye-card" style="${style}">${mmSeat(t,m.player,{win:true})}${mmSeat(t,null,{label:'Bye — advances'})}</div>`;
  const wn=winnerOf(m), decided=!!wn, live=!decided&&m.white&&m.black;
  const rn=rd?rd.number:null, pickable=live&&rn!=null;
  const sW=mmSeat(t,m.white,{win:wn===m.white,lose:decided&&wn!==m.white,pick:pickable?{round:rn,board:m.board,win:'w'}:null});
  const sB=mmSeat(t,m.black,{win:wn===m.black,lose:decided&&wn!==m.black,pick:pickable?{round:rn,board:m.board,win:'b'}:null});
  return `<div class="mm-card ${live?'live':''}" style="${style}">${sW}${sB}</div>`;
}
/* ---- double elimination: clean sectioned columns, clickable ---- */
function deBracket(t){
  if(!t.bracket||!t.bracket.matches) return emptyBracket();
  const ms=t.bracket.matches;
  const secs=[['W','Winners Bracket','Upper',''],['L','Losers Bracket','Lower','gold'],['GF','Grand Final','Decider','red']];
  let html=deBracket._fit?'':mmShell(t);
  secs.forEach(([b,label,tagtxt,cls])=>{
    const sm=ms.filter(m=>m.bracket===b); if(!sm.length) return;
    const rs=[...new Set(sm.map(m=>m.round))].sort((a,b)=>a-b);
    const cols=rs.map(r=>{
      const body=sm.filter(m=>m.round===r).map(m=>deCard(t,m)).join('');
      const title=b==='GF'?'Final':(b==='W'?'WB '+r:'LB '+r);
      return `<div class="de-col"><div class="de-col-h">${title}</div>${body}</div>`;
    }).join('');
    html+=`<div class="bsection"><div class="bsection-h"><span class="st">${label}</span><span class="sx ${cls}">${tagtxt}</span><span class="line"></span></div>
       <div class="bracket-scroll"><div class="de-flow">${cols}</div></div></div>`;
  });
  const gf=ms.find(m=>m.bracket==='GF'); let champ=null;
  if(gf&&gf._a&&gf._b&&gf.result) champ=winnerOf({white:gf._a,black:gf._b,result:gf.result});
  html+=`<div class="bsection-h"><span class="st">Champion</span><span class="sx gold">Title</span><span class="line"></span></div>
     <div class="mm-champ" style="position:relative;left:auto;top:auto;max-width:340px;margin:2px auto 4px">
       <div class="crown" ${champ?'':'style="opacity:.45"'}>${I.crown}</div><div class="cl">Champion</div>
       ${champ?`<div class="cn">${pname(t,champ)}</div>`:`<div class="ctbd">To be decided</div>`}</div>`;
  return html;
}
function deCard(t,m){
  const a=m._a,b=m._b;
  if((a&&!b)||(b&&!a)) return `<div class="de-card bye-card">${mmSeat(t,a||b,{win:true})}${mmSeat(t,null,{label:'Bye — advances'})}</div>`;
  const decided=!!(m.result&&a&&b);
  const wn=decided?winnerOf({white:a,black:b,result:m.result}):null;
  const live=!decided&&a&&b;
  return `<div class="de-card ${live?'live':''}">
     ${mmSeat(t,a,{win:wn===a,lose:decided&&wn!==a,pick:live?{matchId:m.id,win:'w'}:null})}
     ${mmSeat(t,b,{win:wn===b,lose:decided&&wn!==b,pick:live?{matchId:m.id,win:'b'}:null})}</div>`;
}
/* ---- non-elimination: live standings ladder ---- */
function ladderView(t){
  const {arr}=getStandings(t);
  if(!arr.length||!(t.rounds||[]).length)
    return emptyBracket('This format ranks by score, not a knockout tree. Play a round and the live ladder appears here.');
  const top=arr.slice(0,3);
  const visual=[1,0,2];
  const podium=visual.filter(i=>top[i]).map(i=>{
    const s=top[i], place=i+1;
    return `<div class="pod p${place}"><div class="medal">${place}</div>
       <div class="pn">${esc(s.name)}</div>${s.club?`<div class="pc">${esc(s.club)}</div>`:'<div class="pc">&nbsp;</div>'}
       <div class="pp">${fmtScore(s.score)}</div><div class="bar"></div></div>`;
  }).join('');
  const rows=arr.map(s=>`<div class="lrow"><span class="lr rank-${s.rank<=3?s.rank:''}">${s.rank}</span>
     <span class="ln">${esc(s.name)}${s.club?`<span class="lc">${esc(s.club)}</span>`:''}</span>
     <span class="lp">${fmtScore(s.score)}</span></div>`).join('');
  return `<div class="note" style="margin-bottom:18px">${I.info}<div>${esc(FORMATS[t.format].name)} is decided by score, not a bracket. This is the live ladder — it re-ranks automatically as results are entered.</div></div>
     <div class="podium">${podium}</div>
     <div class="ladder">${rows}</div>`;
}

/* ===================================================================
   EVENTS, MODALS, PRINT, BOOT
   =================================================================== */

function reRender(){ render(); }

/* ---- after every render: wire dynamic bits (drag/drop, focus, search) ---- */
function attachDynamic(){
  // tiebreak drag & drop
  $$('.tb-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{ item.classList.add('drag'); e.dataTransfer.setData('text/plain',item.dataset.tb); });
    item.addEventListener('dragend',()=>{ item.classList.remove('drag'); $$('.tb-item').forEach(x=>x.classList.remove('over')); });
    item.addEventListener('dragover',e=>{ e.preventDefault(); item.classList.add('over'); });
    item.addEventListener('dragleave',()=>item.classList.remove('over'));
    item.addEventListener('drop',e=>{ e.preventDefault();
      const from=e.dataTransfer.getData('text/plain'), to=item.dataset.tb;
      tbReorder(from,to);
    });
  });
  // restore focus to search if active
  if(UI._refocus){ const node=$(UI._refocus); if(node){ node.focus(); const v=node.value; node.value=''; node.value=v; } UI._refocus=null; }
}

/* tiebreak list owner: wizard config (create view) or active tournament */
function tbList(){ return (UI.view==='create') ? (wiz.config||(wiz.config=defaultConfig(wiz.format,0))).tiebreaks : activeT().config.tiebreaks; }
function tbConfigObj(){ return (UI.view==='create') ? (wiz.config||(wiz.config=defaultConfig(wiz.format,0))) : activeT().config; }
function tbCommit(){ if(UI.view!=='create') saveDB(true); }
function tbReorder(from,to){
  const list=tbList(); const fi=list.indexOf(from), ti=list.indexOf(to);
  if(fi<0||ti<0||fi===ti) return;
  list.splice(fi,1); list.splice(ti,0,from); tbCommit(); render();
}

/* =========================== CLICK DELEGATION =========================== */
document.addEventListener('click', e=>{
  const node=e.target.closest('[data-act]'); if(!node) return;
  const act=node.dataset.act; const t=activeT();
  const id=node.dataset.id, tb=node.dataset.tb;
  switch(act){
    /* nav */
    case 'go-home': UI.view='home'; UI.railOpen=false; render(); break;
    case 'open-tournament': DB.activeId=id; UI.view='tournament'; UI.tab='players'; UI.roundView=1; saveDB(true); render(); break;
    case 'switch-open': openSwitchModal(); break;
    case 'do-switch': DB.activeId=id; closeModal(); UI.tab='players'; saveDB(true); render(); break;
    case 'tab': UI.tab=node.dataset.tab; UI.railOpen=false; render(); break;
    case 'rail-toggle': UI.railOpen=!UI.railOpen; render(); break;
    case 'rail-close': UI.railOpen=false; render(); break;
    case 'open-help': openHelpModal(); break;
    case 'open-about': openAboutModal(); break;
    case 'modal-bg': if(e.target===node) closeModal(); break;
    case 'close-modal': closeModal(); break;

    /* create wizard */
    case 'start-create': wiz.step=0; wiz.format='swiss'; wiz.name=''; wiz.config=defaultConfig('swiss',0); UI.view='create'; render(); break;
    case 'wiz-cancel': UI.view='home'; render(); break;
    case 'wiz-format': wiz.format=node.dataset.fmt; wiz.config=defaultConfig(wiz.format,0); render(); break;
    case 'wiz-back': wiz.step=Math.max(0,wiz.step-1); render(); break;
    case 'wiz-next': wizNext(); break;
    case 'wiz-toggle-rated': {
      const c=wiz.config||(wiz.config=defaultConfig(wiz.format,0));
      // preserve anything already typed on this step
      const nm=el('wz-name'); if(nm) wiz.name=nm.value;
      const rd=el('wz-rounds'); if(rd) c.rounds=clamp(parseInt(rd.value,10)||5,1,20);
      const wv=el('wz-win'); if(wv) c.pointsWin=parseFloat(wv.value)||1;
      const dv=el('wz-draw'); if(dv){ const d=parseFloat(dv.value); c.pointsDraw=isNaN(d)?0.5:d; }
      const lv=el('wz-loss'); if(lv) c.pointsLoss=parseFloat(lv.value)||0;
      c.rated=!c.rated; render(); break;
    }
    case 'wiz-create': wizCreate(); break;

    /* tiebreaks */
    case 'toggle-tiebreaks': { const c=tbConfigObj(); c.useTiebreaks=(c.useTiebreaks===false); tbCommit(); render(); break; }
    case 'tb-add': { const l=tbList(); if(!l.includes(tb)){ l.push(tb); tbCommit(); render(); } break; }
    case 'tb-remove': { const l=tbList(); const i=l.indexOf(tb); if(i>=0){ l.splice(i,1); tbCommit(); render(); } break; }

    /* players */
    case 'add-player': doAddPlayer(t); break;
    case 'bulk-open': openBulkModal(); break;
    case 'do-bulk-save': doBulkSave(t); break;
    case 'randomize-seeds': randomizeSeeds(t); break;
    case 'withdraw': withdrawPlayer(t,id); toast('Player withdrawn — past games stand','ok'); render(); break;
    case 'reactivate': reactivatePlayer(t,id); render(); break;
    case 'remove-player': if(removePlayer(t,id)) render(); break;
    case 'player-menu': openPlayerModal(t,id); break;
    case 'assign-team': openTeamModal(t,id); break;
    case 'do-assign-team': assignTeam(t,node.dataset.pid,node.dataset.team); break;
    case 'do-reqbye': toggleReqByeModal(t,node.dataset.pid,parseInt(node.dataset.round,10)); break;
    case 'do-late-save': saveLateScore(t,node.dataset.pid); break;
    case 'do-player-save': savePlayerModal(t,node.dataset.pid); break;

    /* pairings */
    case 'generate-schedule': if(generateSchedule(t)){ UI.tab='pairings'; UI.roundView=1; saveDB(true); toast('Pairings generated','ok'); render(); } break;
    case 'generate-next': doGenerateNext(t); break;
    case 'round-tab': UI.roundView=parseInt(node.dataset.n,10); render(); break;
    case 'set-result': doSetResult(t,node); break;
    case 'bracket-win': doBracketWin(t,node); break;
    case 'present-open': UI.present={mode:node.dataset.mode||'pairings', round:currentRoundNumber(t)}; render(); break;
    case 'present-close':
      if(typeof document!=='undefined' && document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
      UI.present=null; render(); break;
    case 'present-mode': if(UI.present){ UI.present.mode=node.dataset.mode; render(); } break;
    case 'present-round': if(UI.present){ const d=node.dataset.dir==='next'?1:-1; UI.present.round=Math.max(1,Math.min((t.rounds||[]).length, (UI.present.round||1)+d)); render(); } break;
    case 'present-fullscreen': {
      const node2=document.querySelector('.present');
      if(node2){
        if(!document.fullscreenElement){ (node2.requestFullscreen||node2.webkitRequestFullscreen||function(){}).call(node2); }
        else if(document.exitFullscreen){ document.exitFullscreen(); }
        setTimeout(render,80);
      }
      break;
    }
    case 'bracket-zoom': {
      const cur=UI.bracketZoom||1;
      UI.bracketZoom = node.dataset.dir==='in' ? Math.min(1.6, +(cur+0.15).toFixed(2))
                     : node.dataset.dir==='out' ? Math.max(0.6, +(cur-0.15).toFixed(2)) : 1;
      render(); break;
    }
    case 'set-bye': break; // handled by change event
    case 'swap-mode': if(UI.swapSel===null){ UI.swapSel='await'; toast('Pick the first player to swap','ok',1800); } else { UI.swapSel=null; } render(); break;
    case 'swap-pick': doSwapPick(t,node); break;
    case 'cancel-swap': UI.swapSel=null; render(); break;
    case 'repair-round': confirmRepair(t); break;
    case 'delete-round': confirmDeleteRound(t); break;

    /* print + export */
    case 'print-pairings': printDoc(t,'pairings'); break;
    case 'print-standings': printDoc(t,'standings'); break;
    case 'print-wallchart': printDoc(t,'wallchart'); break;
    case 'print-bracket': printDoc(t,'bracket'); break;
    case 'print-roster': printDoc(t,'roster'); break;
    case 'print-slips': printDoc(t,'slips'); break;
    case 'print-report': printDoc(t,'report'); break;
    case 'export-json': exportJSON(t); break;
    case 'export-csv': exportStandingsCSV(t); break;
    case 'export-all': exportAllJSON(); break;
    case 'import-trigger': el('file-input').click(); break;

    /* settings */
    case 'toggle-colorrules': t.config.colorRules=!t.config.colorRules; saveDB(true); render(); break;
    case 'set-rated': { const on=node.dataset.on==='1'; if(!!t.config.rated!==on){ t.config.rated=on; saveDB(true); toast(on?'Rated mode on — USCF estimates enabled':'Switched to unrated','ok'); render(); } break; }
    case 'del-tournament': confirmDeleteTournament(id); break;
    case 'confirm-del-tournament': doDeleteTournament(node.dataset.id); break;
  }
});

function doAddPlayer(t){

  const name=nameI.value.trim(); if(!name){ toast('Enter a name','warn'); nameI.focus(); return; }

function randomizeSeeds(t){
  if((t.rounds||[]).length){ toast('Seeds are locked once play starts','warn'); return; }
  for(let i=t.players.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [t.players[i],t.players[j]]=[t.players[j],t.players[i]]; }
  t.players.forEach((p,i)=>p.seed=i+1); saveDB(true); toast('Seeds shuffled','ok'); render();
}
function doBracketWin(t,node){
  const win=node.dataset.win; // 'w' (top/_a) or 'b' (bottom/_b)
  const code = win==='w' ? '1-0' : '0-1';
  if(node.dataset.matchid){ // double elim: operate on the match graph
    const m=t.bracket.matches.find(x=>x.id===node.dataset.matchid);
    if(!m||!m._a||!m._b) return;
    if(m.result===code) return; // already set — no-op (use Pairings to change)
    m.result=code;
    const pr=(t.rounds||[]).flatMap(r=>r.pairings).find(p=>p.matchId===m.id);
    if(pr) pr.result=code;
    projectBracketToRounds(t);
  } else {
    const round=parseInt(node.dataset.round,10), board=parseInt(node.dataset.board,10);
    const rd=t.rounds.find(r=>r.number===round);
    const pr=rd&&rd.pairings.find(p=>p.board===board&&!p.bye);
    if(!pr) return;
    if(pr.result===code) return; // already this winner — no-op
    setResult(t,round,board,code);
  }
  maybeComplete(t); saveDB(true); render();
}
function doSetResult(t,node){
  const board=parseInt(node.dataset.board,10); let code=node.dataset.code;
  if(code==='clear'){ const rd=t.rounds.find(r=>r.number===UI.roundView); const pr=rd&&rd.pairings.find(p=>p.board===board&&!p.bye); if(pr&&pr.result) code=pr.result; else return; }
  setResult(t,UI.roundView,board,code);
  maybeComplete(t); render();
}
function maybeComplete(t){
  const last=t.rounds[t.rounds.length-1];
  if(last && roundComplete(t,last) && !canGenerateNext(t) && t.format!=='swiss'){ t.status='complete'; }
  if(t.format==='swiss' && t.rounds.length>=(t.config.rounds||0) && roundComplete(t,last)){ t.status='complete'; }
  saveDB(true);
}
function doGenerateNext(t){
  if(!t.rounds||!t.rounds.length){
    if(t.format==='swiss'){ const r=generateNextRound(t); afterGenerate(t,r); }
    else { if(generateSchedule(t)){ UI.tab='pairings'; UI.roundView=1; saveDB(true); toast('Pairings generated','ok'); render(); } }
    return;
  }
  const last=t.rounds[t.rounds.length-1];
  if(!roundComplete(t,last)){ toast('Enter all results for this round first','warn',3200); return; }
  if((t.format==='knockout'||t.format==='doubleko')){
    const decisive=last.pairings.every(pr=>pr.bye||winnerOf(pr));
    if(!decisive){ toast('Knockout games can’t be drawn — set a winner on every board','warn',3600); return; }
  }
  const r=generateNextRound(t); afterGenerate(t,r);
}
function afterGenerate(t,r){
  if(!r){ return; } /* generateNextRound already toasted the specific reason */
  if(UI.tab!=='bracket') UI.tab='pairings';
  UI.roundView=currentRoundNumber(t); saveDB(true);
  if(r&&r.warnings&&r.warnings.length){ r.warnings.forEach(w=>toast(w,'warn',4200)); }
  else toast('Round '+currentRoundNumber(t)+' paired','ok');
  render();
}

  if(UI.swapSel==='await'||UI.swapSel==null){ UI.swapSel=sel; toast('Now pick the player to swap with','ok',1800); render(); return; }
  if(UI.swapSel.board===sel.board && UI.swapSel.seat===sel.seat){ UI.swapSel='await'; render(); return; }
  performSwap(t,UI.roundView,UI.swapSel,sel);
  UI.swapSel=null; toast('Players swapped — results on those boards cleared','ok'); render();
}

function _phead(doc,t,subtitle){
  const M=doc.M;
  doc.text(M,M,t.name,{size:21,bold:true,color:[0.06,0.07,0.09]});
  const meta=FORMATS[t.format].name+(t.config.rated?' · USCF-rated (estimated)':'')+' · '+((t.rounds||[]).length)+' round'+(((t.rounds||[]).length)!==1?'s':'')+' · '+fmtDate(Date.now());
  doc.text(M,M+27,meta,{size:10,color:[0.4,0.43,0.48]});
  const ruleY=M+(subtitle?66:46);
  if(subtitle) doc.text(M,M+45,subtitle,{size:13,bold:true,color:[0.09,0.45,0.55]});
  doc.line(M,ruleY,doc.W-M,ruleY,{color:[0.08,0.1,0.14],lw:1.4});
  return ruleY+16;
}
function _pfoot(doc){
  const save=doc.page;
  doc.pages.forEach((p,i)=>{ doc.page=p;
    doc.line(doc.M,doc.H-34,doc.W-doc.M,doc.H-34,{color:[0.8,0.82,0.85],lw:0.5});
    doc.text(doc.M,doc.H-28,'Gambit · Tournament Director — an IroquoisLogic.com product',{size:8.5,color:[0.5,0.53,0.57]});
    doc.text(doc.W-doc.M,doc.H-28,'Page '+(i+1)+' of '+doc.pages.length,{size:8.5,color:[0.5,0.53,0.57],alignR:true});
  });
  doc.page=save;
}
function _wrap(doc,text,x,top,maxw,size,lh,color){
  const words=String(text).split(/\s+/); let line=''; let y=top;
  words.forEach(w=>{ const test=line?line+' '+w:w;
    if(doc.textWidth(test,size,false)>maxw && line){ doc.text(x,y,line,{size,color:color||[0.15,0.17,0.2]}); y+=lh; line=w; }
    else line=test; });
  if(line) { doc.text(x,y,line,{size,color:color||[0.15,0.17,0.2]}); y+=lh; }
  return y;
}
function printDoc(t,kind){ // kept name; now builds a real PDF and downloads it
  try{
    let doc, fname;
    if(kind==='standings'||kind==='report'){ doc=standingsOrReportPDF(t,kind==='report'); fname=kind==='report'?'-report':'-standings'; }
    else if(kind==='pairings'){ doc=pairingsPDF(t); fname='-round'+UI.roundView+'-pairings'; }
    else if(kind==='slips'){ doc=slipsPDF(t); fname='-round'+UI.roundView+'-slips'; }
    else if(kind==='roster'){ doc=rosterPDF(t); fname='-roster'; }
    else if(kind==='bracket'){ doc=bracketPDF(t); fname='-bracket'; }
    else if(kind==='wallchart'){ doc=standingsOrReportPDF(t,false); fname='-standings'; }
    else { doc=standingsOrReportPDF(t,false); fname='-standings'; }
    if(!doc) return;
    _pfoot(doc);
    download(doc.build().blob, slug(t.name)+fname+'.pdf');
    toast('PDF saved','ok');
  }catch(e){ toast('Could not build PDF','err'); console&&console.error&&console.error(e); }
}
function standingsOrReportPDF(t,withRecap){
  const rated=!!t.config.rated;
  const {arr,order,tbOn}=getStandings(t);
  const tb=tbOn?order.filter(k=>k!=='direct'&&k!=='seed'):[];
  const land = rated || tb.length>3;
  const doc=new PDFDoc({landscape:land,margin:48});
  let y=_phead(doc,t, withRecap?'Tournament Recap':'Final Standings');
  if(withRecap){
    const rec=tournamentRecap(t);
    y=_wrap(doc,rec.intro,doc.M,y,doc.W-2*doc.M,12,17); y+=4;
    if(rec.crown){ y=_wrap(doc,rec.crown,doc.M,y,doc.W-2*doc.M,12,17); y+=4; }
    // per-round commentary
    (t.rounds||[]).forEach(rd=>{
      const c=roundCommentary(t,rd.number); if(!c) return;
      if(y>doc.H-doc.M-70){ doc.newPage(); y=doc.M; }
      doc.text(doc.M,y,'Round '+rd.number,{size:12,bold:true,color:[0.09,0.45,0.55]}); y+=16;
      y=_wrap(doc,c,doc.M,y,doc.W-2*doc.M,11,15.5); y+=8;
    });
    y=_wrap(doc,rec.close,doc.M,y+2,doc.W-2*doc.M,11.5,16,[0.3,0.32,0.36]); y+=12;
    if(y>doc.H-doc.M-120){ doc.newPage(); y=doc.M; }
    doc.text(doc.M,y,'Final Standings',{size:13,bold:true,color:[0.09,0.45,0.55]}); y+=20;
  }
  // standings table
  const M=doc.M, right=doc.W-M; let x=M;
  const cols=[]; const nameW = land?180:170;
  cols.push({title:'#',x:x,w:34,align:'l'}); x+=34;
  cols.push({title:'Player',x:x,w:nameW,align:'l'}); x+=nameW;
  cols.push({title:'Club',x:x,w:land?120:96,align:'l'}); x+=land?120:96;
  cols.push({title:'Pts',x:x,w:42,align:'r'}); x+=42;
  if(rated){ ['Rating','Perf','Δ','Est.New'].forEach(h=>{ cols.push({title:h,x:x,w:50,align:'r'}); x+=50; }); }
  const tbW = tb.length? Math.max(30, Math.min(48,(right-x)/tb.length)) : 0;
  tb.forEach(k=>{ cols.push({title:TIEBREAKS[k].ab,x:x,w:tbW,align:'r'}); x+=tbW; });
  const R=rated?computeRatings(t):null;
  const rows=arr.map(s=>{
    const row=[ {t:s.rank,bold:true}, {t:s.name}, {t:s.club||''}, {t:fmtScore(s.score),bold:true,align:'r'} ];
    if(rated){ const r=R[s.id]||{}; row.push({t:r.rating!=null?r.rating:'Unr',align:'r'},{t:r.perf!=null?r.perf:'—',align:'r'},{t:r.played&&r.estDelta!=null?fmtDelta(r.estDelta):'—',align:'r'},{t:r.estNew!=null?r.estNew:'—',bold:true,align:'r'}); }
    tb.forEach(k=>row.push({t:fmtTB(s.tb[k]),align:'r'}));
    return row;
  });
  doc.table(y,cols,rows,{});
  return doc;
}
function pairingsPDF(t){
  const rounds=t.rounds||[]; const rd=rounds.find(r=>r.number===UI.roundView)||rounds[rounds.length-1];
  if(!rd){ toast('No round to export','warn'); return null; }
  const doc=new PDFDoc({margin:48});
  let y=_phead(doc,t,'Round '+rd.number+' — Pairings');
  const M=doc.M;
  const cols=[{title:'Bd',x:M,w:42,align:'l'},{title:'White',x:M+42,w:200,align:'l'},{title:'Result',x:M+242,w:80,align:'l'},{title:'Black',x:M+322,w:200,align:'l'}];
  const rows=rd.pairings.map(pr=> pr.bye ? [{t:'—'},{t:_nm(t,pr.player)+' — BYE',color:[0.45,0.38,0.1]},{t:''},{t:''}]
    : [{t:pr.board,bold:true},{t:_nm(t,pr.white)},{t:'___ : ___',color:[0.5,0.53,0.57]},{t:_nm(t,pr.black)}]);
  doc.table(y,cols,rows,{rowH:24});
  return doc;
}
function slipsPDF(t){
  const rounds=t.rounds||[]; const rd=rounds.find(r=>r.number===UI.roundView)||rounds[rounds.length-1];
  if(!rd){ toast('No round to export','warn'); return null; }
  const games=rd.pairings.filter(p=>!p.bye);
  const doc=new PDFDoc({margin:48});
  let y=_phead(doc,t,'Round '+rd.number+' — Result Slips');
  const M=doc.M, colW=(doc.W-2*M-18)/2, slipH=120; let col=0;
  games.forEach((pr)=>{
    if(y+slipH>doc.H-M-30){ doc.newPage(); y=M; col=0; }
    const x=M+col*(colW+18);
    doc.rect(x,y,colW,slipH-12,{stroke:[0.1,0.12,0.16],lw:1.2});
    doc.text(x+12,y+12,t.name+' · Round '+rd.number+' · Board '+pr.board,{size:10,bold:true});
    doc.line(x+12,y+30,x+colW-12,y+30,{color:[0.8,0.82,0.85],lw:0.5});
    doc.text(x+12,y+40,'White:  '+_nm(t,pr.white),{size:11});
    doc.text(x+colW-90,y+40,'win / draw',{size:9,color:[0.4,0.43,0.48]});
    doc.text(x+12,y+58,'Black:  '+_nm(t,pr.black),{size:11});
    doc.text(x+colW-90,y+58,'win / draw',{size:9,color:[0.4,0.43,0.48]});
    doc.text(x+12,y+82,'Result: __________',{size:10,color:[0.3,0.32,0.36]});
    doc.text(x+12,y+98,'Signed: __________ / __________',{size:9,color:[0.4,0.43,0.48]});
    if(col===1){ y+=slipH; col=0; } else col=1;
  });
  return doc;
}
function rosterPDF(t){
  const rated=!!t.config.rated;
  const ps=[...t.players].sort((a,b)=>a.seed-b.seed);
  const doc=new PDFDoc({margin:48});
  let y=_phead(doc,t,'Player Roster ('+activeCount(t)+' active)');
  const M=doc.M; let x=M;
  const cols=[{title:'#',x:x,w:34,align:'l'}]; x+=34;
  cols.push({title:'Name',x:x,w:200,align:'l'}); x+=200;
  cols.push({title:'Club',x:x,w:130,align:'l'}); x+=130;
  if(rated){ cols.push({title:'Rating',x:x,w:54,align:'r'}); x+=54; }
  cols.push({title:'Signature',x:x,w:doc.W-M-x,align:'l'});
  const rows=ps.map(p=>{ const r=[{t:p.seed},{t:p.name},{t:p.club||''}]; if(rated) r.push({t:p.rating>0?p.rating:'Unrated',align:'r'}); r.push({t:''}); return r; });
  doc.table(y,cols,rows,{rowH:24});
  return doc;
}
function bracketPDF(t){
  if(t.format!=='knockout' || !(t.rounds||[]).length){
    // doubleko / non-elim → fall back to standings sheet
    return standingsOrReportPDF(t,false);
  }
  const doc=new PDFDoc({landscape:true,margin:40});
  let top=_phead(doc,t,'Tournament Bracket');
  const rounds=t.rounds;
  const size=nextPow2(Math.max(2,activeCount(t)));
  const totalR=Math.max(1,Math.round(Math.log2(size)));
  const r0=rounds[0].pairings.length;
  const byRound=[];
  for(let r=0;r<totalR;r++){ const cnt=Math.max(1,Math.round(r0/Math.pow(2,r))); byRound[r]=(r<rounds.length)?rounds[r].pairings.slice():Array.from({length:cnt},()=>({pending:true})); }
  const M=doc.M, availW=doc.W-2*M, availH=doc.H-top-M-10;
  const cols=totalR+1; const colW=availW/cols; const CW=colW-26; const CH=Math.max(26,Math.min(44,(availH/byRound[0].length)-10)); const unit=availH/byRound[0].length;
  const cx=r=>M+r*colW;
  const cy=[]; cy[0]=byRound[0].map((_,i)=>top+i*unit+unit/2);
  for(let r=1;r<totalR;r++){ const prev=cy[r-1],a=[]; for(let i=0;i<byRound[r].length;i++){ const p1=prev[2*i],p2=prev[2*i+1]; a.push(p2!=null?(p1+p2)/2:p1);} cy[r]=a; }
  // headers
  for(let r=0;r<totalR;r++){ const fe=totalR-1-r; const title=fe===0?'Final':fe===1?'Semifinals':fe===2?'Quarterfinals':('Round '+(r+1));
    doc.text(cx(r)+CW/2,top-12,title,{size:9,bold:true,color:[0.09,0.45,0.55],alignC:true}); }
  doc.text(cx(totalR)+CW/2,top-12,'Champion',{size:9,bold:true,color:[0.5,0.4,0.1],alignC:true});
  // connectors
  for(let r=0;r<totalR-1;r++){ for(let i=0;i<byRound[r].length;i++){ const fx=cx(r)+CW, fy=cy[r][i], cxl=cx(r+1), cyy=cy[r+1][Math.floor(i/2)], mid=fx+(colW-CW)/2;
    doc.line(fx,fy,mid,fy,{color:[0.5,0.53,0.58],lw:0.8}); doc.line(mid,fy,mid,cyy,{color:[0.5,0.53,0.58],lw:0.8}); doc.line(mid,cyy,cxl,cyy,{color:[0.5,0.53,0.58],lw:0.8}); } }
  // final->champ
  const fy=cy[totalR-1][0]; doc.line(cx(totalR-1)+CW,fy,cx(totalR),fy,{color:[0.5,0.53,0.58],lw:0.8});
  // cards
  for(let r=0;r<totalR;r++){ byRound[r].forEach((m,i)=>{ const x=cx(r), yc=cy[r][i], yt=yc-CH/2;
    doc.rect(x,yt,CW,CH,{stroke:[0.2,0.22,0.26],lw:0.9});
    doc.line(x,yt+CH/2,x+CW,yt+CH/2,{color:[0.85,0.87,0.9],lw:0.5});
    let wn=null; if(m&&!m.pending&&!m.bye) wn=winnerOf(m);
    const seat=(id,half,win)=>{ if(id==null){ doc.text(x+6,yt+half+CH/4-4,'—',{size:8.5,color:[0.6,0.62,0.66]}); return; }
      doc.text(x+6,yt+half+ (CH/4)-4,doc.fit(_nm(t,id),CW-14,9,!!win),{size:9,bold:!!win,color:win?[0.1,0.4,0.5]:[0.15,0.17,0.2]}); };
    if(m&&m.bye){ seat(m.player,0,true); doc.text(x+6,yt+CH/2+CH/4-4,'Bye',{size:8.5,color:[0.6,0.62,0.66]}); }
    else if(m&&m.pending){ seat(null,0); seat(null,CH/2); }
    else { seat(m.white,0,wn===m.white); seat(m.black,CH/2,wn===m.black); }
  }); }
  // champion
  const champRd=rounds[rounds.length-1]; let champ=null;
  if(rounds.length>=totalR && champRd && champRd.pairings.length===1){ const pr=champRd.pairings[0]; champ=pr.bye?pr.player:winnerOf(pr); }
  const chx=cx(totalR), chy=cy[totalR-1][0];
  doc.rect(chx,chy-CH/2,CW,CH,{stroke:[0.7,0.55,0.15],lw:1.3});
  doc.text(chx+CW/2,chy-3,champ?doc.fit(_nm(t,champ),CW-12,11,true):'TBD',{size:11,bold:true,alignC:true,color:champ?[0.5,0.38,0.05]:[0.6,0.62,0.66]});
  return doc;
}
/* =========================== FILE IMPORT =========================== */
function setupFileInput(){
  const inp=document.createElement('input'); inp.type='file'; inp.id='file-input'; inp.accept='.json,application/json'; inp.style.display='none';
  inp.addEventListener('change',()=>{ const f=inp.files[0]; if(f){ importTournamentFile(f); } inp.value=''; });
  document.body.appendChild(inp);
}

/* =========================== BOOT =========================== */
function boot(){
  loadDB();
  setupFileInput();
  if(DB.activeId && DB.tournaments[DB.activeId]) UI.view='tournament'; else UI.view='home';
  if(!storageOK) setTimeout(()=>toast('Private mode? Saving is disabled — export backups manually.','warn',6000),600);
  render();
}
boot();
